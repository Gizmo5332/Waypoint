// ─── QUICK ADD MODAL ─────────────────────────────────────────────
function QuickAddModal({cats,onAddTask,onAddReminder,onAddGoal,onClose,selectedDate}){
  const[type,setType]=useState('Task');
  // Task fields
  const[tText,setTText]=useState('');
  const[tPri,setTPri]=useState('Medium');
  const[tCat,setTCat]=useState(cats[0]?cats[0].label:'Personal');
  const[tNotes,setTNotes]=useState('');
  const[tDate,setTDate]=useState(selectedDate||TODAY);
  // Reminder fields
  const[rTitle,setRTitle]=useState('');
  const[rDT,setRDT]=useState((selectedDate||TODAY)+'T09:00');
  const[rRec,setRRec]=useState('none');
  const[rCat,setRCat]=useState(cats[0]?cats[0].label:'Personal');
  const[rNotes,setRNotes]=useState('');
  // Goal fields
  const[gTitle,setGTitle]=useState('');
  const[gCat,setGCat]=useState(cats[0]?cats[0].label:'Personal');
  const[gDate,setGDate]=useState('');
  const[gMiles,setGMiles]=useState(['']);
  const[gNotes,setGNotes]=useState('');

  function submit(){
    if(type==='Task'){
      if(!tText.trim())return;
      onAddTask({id:Date.now(),text:tText.trim(),priority:tPri,category:tCat,done:false,date:tDate,notes:tNotes,images:[],updatedAt:Date.now()});
    } else if(type==='Reminder'){
      if(!rTitle.trim())return;
      onAddReminder({id:Date.now(),title:rTitle.trim(),datetime:rDT,recurrence:rRec,category:rCat,notes:rNotes,images:[],dismissed:false,updatedAt:Date.now()});
    } else {
      if(!gTitle.trim())return;
      const ms=gMiles.filter(m=>m.trim()).map((m,i)=>({id:i+1,text:m.trim(),done:false}));
      onAddGoal({id:Date.now(),title:gTitle.trim(),category:gCat,targetDate:gDate,milestones:ms,notes:gNotes,images:[],completed:false,completedDate:null,updatedAt:Date.now()});
    }
    onClose();
  }

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:14}}>
          <span style={{fontSize:15,fontWeight:'bold',color:COLORS.te}}>Quick Add</span>
          <button onClick={onClose} style={{background:'transparent',color:COLORS.mu,fontSize:18}}>✕</button>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:16}}>
          {['Task','Reminder','Goal'].map(t=>(
            <button key={t} onClick={()=>setType(t)} className={`pill${type===t?' active':''}`}>{t}</button>
          ))}
        </div>

        {type==='Task'&&(
          <div>
            <input placeholder="Task description *" value={tText} onChange={e=>setTText(e.target.value)} style={{marginBottom:10}}/>
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <select value={tPri} onChange={e=>setTPri(e.target.value)} style={{flex:1}}>
                {['High','Medium','Low'].map(p=><option key={p}>{p}</option>)}
              </select>
              <select value={tCat} onChange={e=>setTCat(e.target.value)} style={{flex:1}}>
                {cats.map(c=><option key={c.id}>{c.label}</option>)}
              </select>
            </div>
            <input type="date" value={tDate} onChange={e=>setTDate(e.target.value)} style={{marginBottom:10}}/>
            <textarea placeholder="Notes (optional)" rows={2} value={tNotes} onChange={e=>setTNotes(e.target.value)} style={{marginBottom:10,resize:'none'}}/>
          </div>
        )}

        {type==='Reminder'&&(
          <div>
            <input placeholder="Reminder title *" value={rTitle} onChange={e=>setRTitle(e.target.value)} style={{marginBottom:10}}/>
            <input type="datetime-local" value={rDT} onChange={e=>setRDT(e.target.value)} style={{marginBottom:10}}/>
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <select value={rRec} onChange={e=>setRRec(e.target.value)} style={{flex:1}}>
                {['none','daily','weekly','monthly'].map(r=><option key={r}>{r}</option>)}
              </select>
              <select value={rCat} onChange={e=>setRCat(e.target.value)} style={{flex:1}}>
                {cats.map(c=><option key={c.id}>{c.label}</option>)}
              </select>
            </div>
            <textarea placeholder="Notes (optional)" rows={2} value={rNotes} onChange={e=>setRNotes(e.target.value)} style={{marginBottom:10,resize:'none'}}/>
          </div>
        )}

        {type==='Goal'&&(
          <div>
            <input placeholder="Goal title *" value={gTitle} onChange={e=>setGTitle(e.target.value)} style={{marginBottom:10}}/>
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <select value={gCat} onChange={e=>setGCat(e.target.value)} style={{flex:1}}>
                {cats.map(c=><option key={c.id}>{c.label}</option>)}
              </select>
              <input type="date" value={gDate} onChange={e=>setGDate(e.target.value)} style={{flex:1}}/>
            </div>
            <div className="section-label">Milestones (optional)</div>
            {gMiles.map((m,i)=>(
              <input key={i} placeholder={`Milestone ${i+1}`} value={m} onChange={e=>{const a=[...gMiles];a[i]=e.target.value;setGMiles(a);}} style={{marginBottom:6}}/>
            ))}
            {gMiles.length<10&&<button onClick={()=>setGMiles([...gMiles,''])} style={{background:COLORS.bo,color:COLORS.te,padding:'4px 12px',marginBottom:10}}>+ Add Milestone</button>}
            <textarea placeholder="Notes (optional)" rows={2} value={gNotes} onChange={e=>setGNotes(e.target.value)} style={{marginBottom:10,resize:'none'}}/>
          </div>
        )}

        <button onClick={submit} style={{background:COLORS.te,color:'#111',padding:'10px 20px',width:'100%',fontWeight:'bold'}}>Save</button>
      </div>
    </div>
  );
}

// ─── AI ASSISTANT MODAL ──────────────────────────────────────────
function AIAssistant({settings,onSettingsUpdate,tasks,reminders,goals,notes,cats,onClose,
  onTaskAdd,onTaskUpdate,onTaskDelete,onReminderAdd,onReminderSave,onReminderDelete,
  onGoalAdd,onGoalSave,onGoalDelete,onNoteAdd,onNoteDelete}){

  const[messages,setMessages]=useState([{role:'assistant',text:"Hi Jesse! I have full access to Waypoint — I can read your data and make changes. Ask me to create tasks, goals, reminders, notes, or edit and delete anything."}]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(false);
  const[listening,setListening]=useState(false);
  const chatEndRef=useRef();
  const recogRef=useRef(null);

  useEffect(function(){if(chatEndRef.current)chatEndRef.current.scrollIntoView({behavior:'smooth'});},[messages]);

  function buildContext(){
    var allTasks=tasks.map(function(t){return '[id:'+t.id+'] '+t.priority+': '+t.text+' date:'+t.date+(t.done?' DONE':'');}).join('\n')||'none';
    var allReminders=reminders.filter(function(r){return !r.dismissed;}).map(function(r){return '[id:'+r.id+'] '+r.title+' at '+r.datetime+' recur:'+r.recurrence+' cat:'+r.category;}).join('\n')||'none';
    var allGoals=goals.filter(function(g){return !g.completed;}).map(function(g){return '[id:'+g.id+'] '+g.title+' ('+g.category+') target:'+g.targetDate+' milestones: '+g.milestones.map(function(m){return '[mid:'+m.id+']'+m.text+(m.done?' DONE':'');}).join(', ');}).join('\n')||'none';
    var recentNotes=notes.slice(0,5).map(function(n){return '[id:'+n.id+'] ['+n.tag+'] '+n.body;}).join('\n')||'none';
    var catList=cats.map(function(c){return c.label;}).join(', ');
    return 'You are Jesse\'s Waypoint personal assistant with FULL READ AND WRITE ACCESS.\nToday is '+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})+' ('+TODAY+').\n\nYou can CREATE, UPDATE, and DELETE tasks, reminders, goals, and notes.\nWhen the user asks you to make any change, describe what you will do clearly, then append this EXACT block at the absolute end of your response (nothing after it):\n|||ACTION:{"action":"ACTION_TYPE","description":"Brief human-readable summary of the change","data":{...}}\n\nACTION_TYPES and required data shapes:\ncreate_task: {text,priority("High"/"Medium"/"Low"),category,date("YYYY-MM-DD"),notes}\nupdate_task: {id,text,priority,category,date,notes,done(boolean)}\ndelete_task: {id,text}\ncreate_reminder: {title,datetime("YYYY-MM-DDTHH:MM"),recurrence("none"/"daily"/"weekly"/"monthly"),category,notes}\nupdate_reminder: {id,title,datetime,recurrence,category,notes}\ndelete_reminder: {id,title}\ncreate_goal: {title,category("Health"/"Financial"/"Personal Growth"/"Family"/"Career"),targetDate("YYYY-MM-DD"),milestones:[{"text":"milestone text"}],notes}\nupdate_goal: {id,title,category,targetDate,notes}\ndelete_goal: {id,title}\ncreate_note: {body,tag("idea"/"todo"/"reminder"/"personal"/"family"/"health"/"financial"/"misc")}\ndelete_note: {id,body}\n\nRULES:\n- Describe the action before the |||ACTION: block\n- Convert relative dates (today, tomorrow, next week) to YYYY-MM-DD using today '+TODAY+'\n- For updates/deletes use the exact numeric id from the data below\n- For deletes always name what will be deleted\n- Include |||ACTION: even when proposing — user will confirm before it executes\n- Put |||ACTION: at the absolute end, nothing after it\n- If no change is needed, do NOT include |||ACTION:\n\nAvailable categories: '+catList+'\n\nCURRENT DATA:\nTasks:\n'+allTasks+'\n\nReminders:\n'+allReminders+'\n\nActive Goals:\n'+allGoals+'\n\nRecent Notes:\n'+recentNotes;
  }

  function parseAction(text){
    var marker='|||ACTION:';
    var idx=text.indexOf(marker);
    if(idx===-1)return{displayText:text,action:null};
    var displayText=text.slice(0,idx).trim();
    var jsonStr=text.slice(idx+marker.length).trim();
    try{var action=JSON.parse(jsonStr);return{displayText:displayText,action:action};}
    catch(e){return{displayText:text,action:null};}
  }

  function executeAction(action){
    var d=action.data;
    var now=Date.now();
    if(action.action==='create_task'){
      onTaskAdd({id:now+Math.random(),text:d.text,priority:d.priority||'Medium',category:d.category||'Personal',done:false,date:d.date||TODAY,notes:d.notes||'',images:[],updatedAt:now});
      return '✓ Task created: "'+d.text+'"';
    }
    if(action.action==='update_task'){
      var exT=tasks.find(function(t){return String(t.id)===String(d.id);});
      if(exT){onTaskUpdate({...exT,...d,updatedAt:now});}
      return '✓ Task updated: "'+(d.text||d.id)+'"';
    }
    if(action.action==='delete_task'){
      onTaskDelete(d.id);
      return '✓ Task deleted: "'+d.text+'"';
    }
    if(action.action==='create_reminder'){
      onReminderAdd({id:now+Math.random(),title:d.title,datetime:d.datetime,recurrence:d.recurrence||'none',category:d.category||'Personal',notes:d.notes||'',images:[],dismissed:false,updatedAt:now});
      return '✓ Reminder created: "'+d.title+'"';
    }
    if(action.action==='update_reminder'){
      var exR=reminders.find(function(r){return String(r.id)===String(d.id);});
      if(exR){onReminderSave({...exR,...d,updatedAt:now});}
      return '✓ Reminder updated: "'+(d.title||d.id)+'"';
    }
    if(action.action==='delete_reminder'){
      onReminderDelete(d.id);
      return '✓ Reminder deleted: "'+d.title+'"';
    }
    if(action.action==='create_goal'){
      var ms=(d.milestones||[]).map(function(m,i){return{id:i+1,text:(m.text||m),done:false};});
      onGoalAdd({id:now+Math.random(),title:d.title,category:d.category||'Personal Growth',targetDate:d.targetDate||'',milestones:ms,notes:d.notes||'',images:[],completed:false,completedDate:null,updatedAt:now});
      return '✓ Goal created: "'+d.title+'"';
    }
    if(action.action==='update_goal'){
      var exG=goals.find(function(g){return String(g.id)===String(d.id);});
      if(exG){onGoalSave({...exG,...d,updatedAt:now});}
      return '✓ Goal updated: "'+(d.title||d.id)+'"';
    }
    if(action.action==='delete_goal'){
      onGoalDelete(d.id);
      return '✓ Goal deleted: "'+d.title+'"';
    }
    if(action.action==='create_note'){
      onNoteAdd({id:now+Math.random(),body:d.body,tag:d.tag||'idea',createdAt:new Date().toISOString(),updatedAt:now});
      return '✓ Note saved';
    }
    if(action.action==='delete_note'){
      onNoteDelete(d.id);
      return '✓ Note deleted';
    }
    return '✓ Done';
  }

  function handleConfirm(msgIdx){
    var msg=messages[msgIdx];
    if(!msg||!msg.pendingAction)return;
    var feedback=executeAction(msg.pendingAction);
    setMessages(function(prev){
      var updated=prev.map(function(m,i){return i===msgIdx?{...m,actionState:'confirmed'}:m;});
      return[...updated,{role:'system',text:feedback}];
    });
  }

  function handleCancel(msgIdx){
    setMessages(function(prev){
      var updated=prev.map(function(m,i){return i===msgIdx?{...m,actionState:'cancelled'}:m;});
      return[...updated,{role:'system',text:'Cancelled.'}];
    });
  }

  function sendMessage(text){
    if(!text.trim()||loading)return;
    var userMsg={role:'user',text:text.trim()};
    setMessages(function(m){return[...m,userMsg];});
    setInput('');
    setLoading(true);
    var history=messages.slice(-8).map(function(m){return{role:(m.role==='assistant'||m.role==='system')?'assistant':'user',content:m.text};});
    var hasGroq=!!settings.groqApiKey;
    var hasGemini=!!settings.geminiApiKey;
    var useGroq=(settings.aiEngine==='groq'||(settings.aiEngineForcedGroqUntil&&new Date()<new Date(settings.aiEngineForcedGroqUntil))||!hasGemini)&&hasGroq;

    function handleReply(reply){
      var parsed=parseAction(reply);
      var newMsg={role:'assistant',text:parsed.displayText};
      if(parsed.action){newMsg.pendingAction=parsed.action;newMsg.actionState='pending';}
      setMessages(function(m){return[...m,newMsg];});
      if('speechSynthesis' in window){
        window.speechSynthesis.cancel();
        var utt=new SpeechSynthesisUtterance(parsed.displayText);
        utt.rate=1.05;utt.pitch=1;
        window.speechSynthesis.speak(utt);
      }
      setLoading(false);
    }
    function handleErr(){
      setMessages(function(m){return[...m,{role:'assistant',text:'Error reaching AI. Check your API key in Settings.'}];});
      setLoading(false);
    }

    if(useGroq){
      fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.groqApiKey},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:buildContext()},...history,{role:'user',content:text}],max_tokens:600})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.error){handleReply('Groq error: '+d.error.message);return;}
        var reply=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'No response.';
        handleReply(reply);
      })
      .catch(handleErr);
    } else if(settings.geminiApiKey){
      fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+settings.geminiApiKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:buildContext()+'\n\nConversation so far:\n'+history.map(function(m){return m.role+': '+m.content;}).join('\n')+'\n\nuser: '+text}]}]})})
      .then(function(r){
        var status=r.status;
        return r.json().then(function(d){return{status:status,data:d};});
      })
      .then(function(res){
        if(res.status===429){
          var until=new Date();until.setHours(24,0,0,0);
          onSettingsUpdate({...settings,aiEngine:'groq',aiEngineForcedGroqUntil:until.toISOString()});
          if(settings.groqApiKey){
            fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.groqApiKey},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:buildContext()},...history,{role:'user',content:text}],max_tokens:600})})
            .then(function(r){return r.json();})
            .then(function(d){
              if(d.error){handleReply('Groq error: '+d.error.message);return;}
              var reply=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'No response.';
              handleReply(reply);
            })
            .catch(handleErr);
          } else {
            handleReply('Gemini quota reached. Add a Groq key in Settings for seamless fallback.');
          }
          return;
        }
        if(res.data.error){handleReply('Gemini error: '+res.data.error.message);return;}
        var reply=(res.data.candidates&&res.data.candidates[0]&&res.data.candidates[0].content&&res.data.candidates[0].content.parts&&res.data.candidates[0].content.parts[0]&&res.data.candidates[0].content.parts[0].text)||'No response.';
        handleReply(reply);
      })
      .catch(handleErr);
    } else {
      handleReply('No API key set. Add your Gemini or Groq key in Settings → API.');
    }
  }

  function startListening(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Speech recognition not supported on this browser.');return;}
    if(recogRef.current){recogRef.current.stop();}
    const r=new SR();
    r.continuous=false;r.interimResults=false;r.lang='en-US';
    r.onstart=function(){setListening(true);};
    r.onend=function(){setListening(false);};
    r.onresult=function(e){
      const transcript=e.results[0][0].transcript.trim();
      const phrase=(settings.closePhrase||'hey waypoint close').toLowerCase();
      if(transcript.toLowerCase().includes(phrase)){
        window.speechSynthesis&&window.speechSynthesis.cancel();
        onClose();return;
      }
      sendMessage(transcript);
    };
    r.onerror=function(){setListening(false);};
    recogRef.current=r;
    r.start();
  }

  function handleClose(){if(window.speechSynthesis)window.speechSynthesis.cancel();onClose();}

  return(
    <div className="modal-overlay" onClick={handleClose}>
      <div className="modal-box center" style={{maxHeight:'80vh',display:'flex',flexDirection:'column',margin:16}} onClick={function(e){e.stopPropagation();}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexShrink:0}}>
          <div>
            <span style={{fontSize:15,fontWeight:'bold',color:COLORS.te}}>🤖 AI Assistant</span>
            <span style={{fontSize:11,color:COLORS.mu,marginLeft:8}}>● {settings.aiEngine==='gemini'?'Gemini':'Groq'}</span>
          </div>
          <button onClick={handleClose} style={{background:'transparent',color:COLORS.mu,fontSize:18}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:'auto',marginBottom:12,display:'flex',flexDirection:'column',gap:10}}>
          {messages.map(function(m,i){
            var isUser=m.role==='user';
            var isSystem=m.role==='system';
            var isConfirmed=m.actionState==='confirmed';
            var isCancelled=m.actionState==='cancelled';
            return(
              <div key={i}>
                <div style={{display:'flex',justifyContent:isUser?'flex-end':'flex-start'}}>
                  <div style={{maxWidth:'82%',padding:'9px 13px',borderRadius:isUser?'16px 16px 4px 16px':'16px 16px 16px 4px',background:isUser?COLORS.te+'33':isSystem?COLORS.gr+'22':COLORS.bo,color:isSystem?COLORS.gr:COLORS.tx,fontSize:13,lineHeight:1.5,border:'1px solid '+(isUser?COLORS.te+'55':isSystem?COLORS.gr+'44':COLORS.bo),opacity:(isConfirmed||isCancelled)?0.7:1}}>
                    {m.text}
                  </div>
                </div>
                {m.pendingAction&&m.actionState==='pending'&&(
                  <div style={{display:'flex',gap:8,marginTop:6,marginLeft:4}}>
                    <div style={{flex:1,fontSize:11,color:COLORS.mu,padding:'4px 8px',background:COLORS.ca,borderRadius:6,border:'1px solid '+COLORS.bo}}>
                      {m.pendingAction.description||m.pendingAction.action}
                    </div>
                    <button onClick={function(){handleConfirm(i);}} style={{background:COLORS.gr,color:'#111',padding:'4px 14px',fontSize:12,fontWeight:'bold',borderRadius:6,flexShrink:0}}>Confirm</button>
                    <button onClick={function(){handleCancel(i);}} style={{background:COLORS.bo,color:COLORS.mu,padding:'4px 12px',fontSize:12,borderRadius:6,flexShrink:0}}>Cancel</button>
                  </div>
                )}
                {m.pendingAction&&m.actionState==='confirmed'&&(
                  <div style={{fontSize:11,color:COLORS.gr,marginTop:4,marginLeft:4}}>✓ Confirmed</div>
                )}
                {m.pendingAction&&m.actionState==='cancelled'&&(
                  <div style={{fontSize:11,color:COLORS.mu,marginTop:4,marginLeft:4}}>Cancelled</div>
                )}
              </div>
            );
          })}
          {loading&&<div style={{display:'flex',justifyContent:'flex-start'}}><div style={{padding:'9px 13px',borderRadius:'16px 16px 16px 4px',background:COLORS.bo,color:COLORS.mu,fontSize:13}}>Thinking…</div></div>}
          <div ref={chatEndRef}/>
        </div>
        <div style={{display:'flex',gap:8,flexShrink:0}}>
          <button onMouseDown={startListening} style={{background:listening?COLORS.rd:COLORS.bo,color:listening?'#fff':COLORS.mu,width:40,height:40,borderRadius:8,fontSize:18,flexShrink:0}}>{listening?'⏹':'🎤'}</button>

const NOTE_TAGS=['idea','todo','reminder','personal','family','health','financial','misc'];

function NotesModule({notes,onAdd,onDelete}){
  const[body,setBody]=useState('');
  const[tag,setTag]=useState('idea');
  const[search,setSearch]=useState('');
  const[filterTag,setFilterTag]=useState('all');

  function submit(){
    if(!body.trim())return;
    onAdd({id:Date.now(),body:body.trim(),tag,createdAt:new Date().toISOString()});
    setBody('');
  }

  const filtered=notes
    .filter(n=>filterTag==='all'||n.tag===filterTag)
    .filter(n=>!search||n.body.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

  const tagColor={idea:COLORS.te,todo:COLORS.yl,reminder:COLORS.rd,personal:COLORS.bl,family:COLORS.bl,health:COLORS.gr,financial:COLORS.yl,misc:COLORS.mu};

  return(
    <div style={{padding:'12px 14px',paddingBottom:80}}>
      {/* Quick capture */}
      <div className="card" style={{marginBottom:14}}>
        <div className="section-label">QUICK CAPTURE</div>

        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <select value={tag} onChange={e=>setTag(e.target.value)} style={{flex:1}}>
            {NOTE_TAGS.map(t=><option key={t}>{t}</option>)}
          </select>
          <button onClick={submit} style={{background:COLORS.te,color:'#111',padding:'8px 16px',fontWeight:'bold',flexShrink:0}}>Save</button>
        </div>
      </div>

      {/* Search + filter */}
      <input placeholder="🔍 Search notes..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:10}}/>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
        <button onClick={()=>setFilterTag('all')} className={`pill${filterTag==='all'?' active':''}`}>All</button>
        {NOTE_TAGS.map(t=>(
          <button key={t} onClick={()=>setFilterTag(t)} className={`pill${filterTag===t?' active':''}`}>{t}</button>

      </div>

      {filtered.length===0&&<div className="card" style={{textAlign:'center',color:COLORS.mu,padding:20}}>No notes yet. Capture something above.</div>}
      {filtered.map(n=>{
        const tc=tagColor[n.tag]||COLORS.mu;
        const d=new Date(n.createdAt);
        const ds=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

              <span className="badge" style={{background:tc+'22',color:tc,border:`1px solid ${tc}44`}}>{n.tag}</span>

                <span style={{fontSize:11,color:COLORS.mu}}>{ds}</span>
                <button onClick={()=>onDelete(n.id)} style={{background:'transparent',color:COLORS.mu,fontSize:12,padding:'0 4px'}}>✕</button>
              </div>
            </div>
            <div style={{fontSize:14,whiteSpace:'pre-wrap',lineHeight:1.5}}>{n.body}</div>
          </div>
        );
      })}
    </div>
  );
}

  function cancelEdit(){setTitle(item.title);setCategory(item.category);setTargetDate(item.targetDate||'');setNotes(item.notes||'');setLocalMiles((item.milestones||[]).map(function(m){return{...m};}));setEditMode(false);setEditMileId(null);setAddingMile(false);}
  function saveAll(){onSave({...item,title:title,category:category,targetDate:targetDate,notes:notes,milestones:localMiles});setEditMode(false);}
  function toggleMilestone(id){var updated=item.milestones.map(function(m){return m.id===id?{...m,done:!m.done}:m;});onSave({...item,milestones:updated});}
  function editMoveMile(idx,dir){var ms=localMiles.slice();var ni=idx+dir;if(ni<0||ni>=ms.length)return;var tmp=ms[idx];ms[idx]=ms[ni];ms[ni]=tmp;setLocalMiles(ms);}
  function editDeleteMile(id){setLocalMiles(localMiles.filter(function(m){return m.id!==id;}));}
  function startEditMile(m){setEditMileId(m.id);setEditMileText(m.text);setEditMileDate(m.date||'');}
  function saveEditMile(){
    var updated=localMiles.map(function(m){return m.id!==editMileId?m:{...m,text:editMileText,date:editMileDate||null};});
    setLocalMiles(updated);
    var changedMile=updated.find(function(m){return m.id===editMileId;});
    if(changedMile&&changedMile.date){
      var already=tasks.find(function(t){return t.goalRef&&t.goalRef.milestoneId===changedMile.id&&t.goalRef.isMilestoneSelf;});
      if(!already){onTaskAdd({id:Date.now()+Math.random(),text:changedMile.text,priority:'Medium',category:'Personal',done:false,date:changedMile.date,notes:'',images:[],goalRef:{goalId:item.id,goalTitle:item.title,milestoneId:changedMile.id,milestoneText:changedMile.text,isMilestoneSelf:true},updatedAt:Date.now()});}
      else{onTaskUpdate({...already,text:changedMile.text,date:changedMile.date,updatedAt:Date.now()});}
    }
    setEditMileId(null);
  }
  function addMilestone(){if(!newMileText.trim())return;setLocalMiles([...localMiles,{id:Date.now()+Math.random(),text:newMileText.trim(),done:false,date:null}]);setNewMileText('');setAddingMile(false);}
  function handleReorderTask(task,milestoneId,dir){
    var mileTasks=tasks.filter(function(t){return t.goalRef&&t.goalRef.goalId===item.id&&t.goalRef.milestoneId===milestoneId&&!t.goalRef.isMilestoneSelf;});
    var idx=mileTasks.findIndex(function(t){return t.id===task.id;});var newIdx=idx+(dir==='up'?-1:1);
    if(newIdx<0||newIdx>=mileTasks.length)return;
    onTaskSwap(mileTasks[idx].id,mileTasks[newIdx].id);
  }
  function handleMoveTask(task,targetMileId){var targetMile=localMiles.find(function(m){return m.id===targetMileId;});if(!targetMile)return;onTaskUpdate({...task,goalRef:{...task.goalRef,milestoneId:targetMile.id,milestoneText:targetMile.text},updatedAt:Date.now()});}
  function handleImg(e){var files=Array.from(e.target.files);if(!files.length)return;var newImgs=[];var loaded=0;files.forEach(function(f){var r=new FileReader();r.onload=function(ev){compressImage(ev.target.result,800,0.6).then(function(compressed){newImgs.push({id:Date.now()+Math.random(),base64:compressed});loaded++;if(loaded===files.length){onSave({...item,images:[...(item.images||[]),...newImgs]});}});};r.readAsDataURL(f);});}
  function removeImg(imgId){onSave({...item,images:(item.images||[]).filter(function(i){return i.id!==imgId;})});}

  var daysLeft=item.targetDate?Math.ceil((new Date(item.targetDate+'T00:00:00')-new Date())/(1000*60*60*24)):null;
  var done=item.milestones.filter(function(m){return m.done;}).length;
  var total=item.milestones.length;
  var pct=total>0?Math.round((done/total)*100):0;
  var catColor=GOAL_CAT_COLOR[item.category]||COLORS.mu;

  // ── EDIT MODE ──────────────────────────────────────────────────
  if(editMode) return(
    <div>
      <div style={{fontSize:12,color:COLORS.te,fontWeight:'bold',letterSpacing:1,marginBottom:12}}>EDITING GOAL</div>
      <div className="section-label">Title</div>
      <input value={title} onChange={function(e){setTitle(e.target.value);}} style={{marginBottom:10}}/>
      <div style={{display:'flex',gap:8,marginBottom:10}}>
        <div style={{flex:1}}><div className="section-label">Category</div>
          <select value={category} onChange={function(e){setCategory(e.target.value);}}>
            {cats.map(function(c){return <option key={c.id}>{c.label}</option>;})}
          </select>
        </div>
        <div style={{flex:1}}><div className="section-label">Target Date</div>
          <input type="date" value={targetDate} onChange={function(e){setTargetDate(e.target.value);}}/>
        </div>
      </div>
      <div className="section-label">Notes</div>
      <textarea rows={2} value={notes} onChange={function(e){setNotes(e.target.value);}} style={{marginBottom:12,resize:'vertical'}}/>
      <div className="section-label">MILESTONES</div>
      {localMiles.map(function(m,idx){return(
        <div key={m.id} style={{marginBottom:6,border:'1px solid '+COLORS.bo,borderRadius:8,padding:'8px 10px'}}>
          {editMileId===m.id?(
            <div>
              <input value={editMileText} onChange={function(e){setEditMileText(e.target.value);}} style={{marginBottom:6,fontSize:12}}/>
              <div style={{display:'flex',gap:6,marginBottom:6,alignItems:'center'}}>
                <input type="date" value={editMileDate} onChange={function(e){setEditMileDate(e.target.value);}} style={{flex:1,fontSize:11}}/>
                <span style={{fontSize:10,color:COLORS.mu,whiteSpace:'nowrap'}}>→ task list</span>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={saveEditMile} style={{flex:1,background:COLORS.te,color:'#111',padding:'4px 0',fontSize:12,fontWeight:'bold'}}>Save</button>
                <button onClick={function(){setEditMileId(null);}} style={{background:COLORS.bo,color:COLORS.mu,padding:'4px 8px',fontSize:12}}>Cancel</button>
              </div>
            </div>
          ):(
            <div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{flex:1,fontSize:12,color:m.done?COLORS.mu:COLORS.tx,textDecoration:m.done?'line-through':'none'}}>{m.text}</span>
                {m.date&&<span style={{fontSize:10,color:COLORS.te,flexShrink:0}}>{fmtDate(m.date)}</span>}
                <button onClick={function(){editMoveMile(idx,-1);}} disabled={idx===0} style={{background:'transparent',color:idx===0?COLORS.bo:COLORS.mu,fontSize:11,padding:'0 2px'}}>▲</button>
                <button onClick={function(){editMoveMile(idx,1);}} disabled={idx===localMiles.length-1} style={{background:'transparent',color:idx===localMiles.length-1?COLORS.bo:COLORS.mu,fontSize:11,padding:'0 2px'}}>▼</button>
                <button onClick={function(){startEditMile(m);}} style={{background:'transparent',color:COLORS.bl,fontSize:11,padding:'0 2px'}}>✏</button>
                <button onClick={function(){editDeleteMile(m.id);}} style={{background:'transparent',color:COLORS.rd,fontSize:11,padding:'0 2px'}}>✕</button>
              </div>
              <MilestoneTasksSection milestone={m} milestoneIdx={idx} allMilestones={localMiles} goalId={item.id} goalTitle={item.title} tasks={tasks} onTaskAdd={onTaskAdd} onTaskUpdate={onTaskUpdate} onTaskDelete={onTaskDelete} onMoveTask={handleMoveTask} onReorderTask={handleReorderTask}/>
            </div>
          )}
        </div>
      );})}
      {addingMile?(
        <div style={{background:COLORS.ca,borderRadius:6,padding:'8px',marginBottom:10}}>
          <input ref={newMileRef} value={newMileText} onChange={function(e){setNewMileText(e.target.value);}} placeholder="Milestone name..." style={{marginBottom:6,fontSize:12}}/>
          <div style={{display:'flex',gap:6}}>
            <button onClick={addMilestone} style={{flex:1,background:COLORS.te,color:'#111',padding:'4px 0',fontSize:12,fontWeight:'bold'}}>Add</button>
            <button onClick={function(){setAddingMile(false);setNewMileText('');}} style={{background:COLORS.bo,color:COLORS.mu,padding:'4px 8px',fontSize:12}}>Cancel</button>
          </div>
        </div>
      ):(
        <button onClick={function(){setAddingMile(true);}} style={{background:COLORS.bo,color:COLORS.te,padding:'6px 12px',fontSize:12,border:'1px dashed '+COLORS.te+'66',width:'100%',marginBottom:12}}>+ Add Milestone</button>
      )}
      <div style={{display:'flex',gap:8,marginTop:12}}>
        <button onClick={saveAll} style={{flex:1,background:COLORS.te,color:'#111',padding:'10px 0',fontWeight:'bold',fontSize:13}}>Save</button>
        <button onClick={cancelEdit} style={{background:COLORS.bo,color:COLORS.mu,padding:'10px 16px',fontSize:13}}>Cancel</button>
      </div>
    </div>
  );

  // ── READ MODE ──────────────────────────────────────────────────
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
        <div style={{fontSize:16,fontWeight:'bold',textDecoration:item.completed?'line-through':'none',color:item.completed?COLORS.mu:COLORS.tx,flex:1,paddingRight:8}}>{item.title}</div>
        {!item.completed&&<button onClick={enterEdit} style={{background:COLORS.bl+'22',color:COLORS.bl,border:'1px solid '+COLORS.bl+'44',padding:'5px 12px',fontSize:12,flexShrink:0}}>✏ Edit</button>}
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12,alignItems:'center'}}>
        <span className="badge" style={{background:catColor+'22',color:catColor,border:'1px solid '+catColor+'44'}}>{item.category}</span>
        {item.targetDate?(
          <span style={{fontSize:12,color:COLORS.mu}}>Target: {fmtDate(item.targetDate)}
            {daysLeft!==null&&!item.completed&&(<span style={{color:daysLeft<7?COLORS.yl:COLORS.te,fontWeight:'bold',marginLeft:6}}>{daysLeft<0?'Overdue':daysLeft===0?'Due today':daysLeft+'d left'}</span>)}
          </span>
        ):null}
        {item.completed?<span className="badge" style={{background:COLORS.gr+'22',color:COLORS.gr,border:'1px solid '+COLORS.gr+'44'}}>Complete</span>:null}
      </div>
      {total>0&&(
        <div style={{marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:COLORS.mu,marginBottom:4}}>
            <span>Progress</span><span style={{color:COLORS.te}}>{done}/{total} · {pct}%</span>
          </div>
          <div style={{height:6,background:COLORS.bo,borderRadius:3,overflow:'hidden',marginBottom:12}}>
            <div style={{height:'100%',width:pct+'%',background:pct===100?COLORS.gr:COLORS.te,borderRadius:3,transition:'width .3s'}}/>
          </div>
          <div className="section-label">MILESTONES</div>
          {item.milestones.map(function(m){
            var mileExp=!!expandedMiles[m.id];
            var mileTasks=tasks.filter(function(t){return t.goalRef&&t.goalRef.goalId===item.id&&t.goalRef.milestoneId===m.id&&!t.goalRef.isMilestoneSelf;});
            var activeTasks=mileTasks.filter(function(t){return !t.done;});
            var compTasks=mileTasks.filter(function(t){return t.done;});
            var showComp=!!expandedCompTasks[m.id];
            if(m.done&&!mileExp){return(
              <div key={m.id} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 8px',marginBottom:4,background:COLORS.ca,borderRadius:6,cursor:'pointer'}} onClick={function(){setExpandedMiles(function(p){var n={...p};n[m.id]=true;return n;});}}>
                <div style={{width:16,height:16,borderRadius:3,border:'2px solid '+COLORS.gr,background:COLORS.gr,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><span style={{color:'#111',fontSize:10,fontWeight:'bold'}}>✓</span></div>
                <span style={{flex:1,fontSize:12,textDecoration:'line-through',color:COLORS.mu}}>{m.text}</span>
                {m.date&&<span style={{fontSize:10,color:COLORS.mu,flexShrink:0}}>{fmtDate(m.date)}</span>}
                <span style={{fontSize:10,color:COLORS.mu}}>▶</span>
              </div>
            );}
            return(
              <div key={m.id} style={{borderBottom:'1px solid '+COLORS.bo,paddingBottom:6,marginBottom:4}}>
                <div style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0'}}>
                  <div onClick={function(){toggleMilestone(m.id);}} style={{width:16,height:16,borderRadius:3,border:'2px solid '+(m.done?COLORS.gr:COLORS.bo),background:m.done?COLORS.gr:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}>
                    {m.done&&<span style={{color:'#111',fontSize:10,fontWeight:'bold'}}>✓</span>}
                  </div>
                  <span style={{flex:1,fontSize:12,textDecoration:m.done?'line-through':'none',color:m.done?COLORS.mu:COLORS.tx}}>{m.text}</span>
                  {m.date&&<span style={{fontSize:10,color:COLORS.te,flexShrink:0}}>{fmtDate(m.date)}</span>}
                  {m.done&&<span onClick={function(){setExpandedMiles(function(p){var n={...p};n[m.id]=false;return n;});}} style={{fontSize:10,color:COLORS.mu,cursor:'pointer'}}>▲</span>}
                </div>
                {activeTasks.length>0&&(<div style={{paddingLeft:20}}>{activeTasks.map(function(t){return(
                  <div key={t.id} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0',borderBottom:'1px solid '+COLORS.bo+'33'}}>
                    <div onClick={function(){onTaskUpdate({...t,done:true,updatedAt:Date.now()});}} style={{width:13,height:13,borderRadius:3,border:'2px solid '+COLORS.bo,background:'transparent',flexShrink:0,cursor:'pointer'}}/>
                    <span style={{flex:1,fontSize:12,color:COLORS.tx}}>{t.text}</span>
                    {t.date&&<span style={{fontSize:10,color:COLORS.te,flexShrink:0}}>{fmtDate(t.date)}</span>}
                  </div>
                );})}</div>)}
                {compTasks.length>0&&(<div style={{paddingLeft:20,marginTop:2}}>
                  <button onClick={function(){setExpandedCompTasks(function(p){var n={...p};n[m.id]=!n[m.id];return n;});}} style={{background:'transparent',color:COLORS.mu,fontSize:11,padding:'2px 0'}}>{showComp?'▼':'▶'} {compTasks.length} completed</button>
                  {showComp&&compTasks.map(function(t){return(
                    <div key={t.id} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0',opacity:0.6}}>
                      <div onClick={function(){onTaskUpdate({...t,done:false,updatedAt:Date.now()});}} style={{width:13,height:13,borderRadius:3,border:'2px solid '+COLORS.gr,background:COLORS.gr,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}><span style={{color:'#111',fontSize:9,fontWeight:'bold'}}>✓</span></div>
                      <span style={{flex:1,fontSize:12,color:COLORS.mu,textDecoration:'line-through'}}>{t.text}</span>
                      {t.date&&<span style={{fontSize:10,color:COLORS.mu,flexShrink:0}}>{fmtDate(t.date)}</span>}
                    </div>
                  );})}
                </div>)}
              </div>
            );
          })}
        </div>
      )}
      {item.notes?<div style={{fontSize:13,background:COLORS.bo,borderRadius:6,padding:'8px 10px',marginBottom:12,whiteSpace:'pre-wrap'}}>{item.notes}</div>:null}
      {(item.images||[]).length>0&&(
        <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10}}>
          {(item.images||[]).map(function(img){return(
            <div key={img.id} style={{position:'relative'}}>
              <img src={img.base64} style={{width:70,height:70,objectFit:'cover',borderRadius:6,border:'1px solid '+COLORS.bo}}/>
              <button onClick={function(){removeImg(img.id);}} style={{position:'absolute',top:-4,right:-4,background:COLORS.rd,color:'#fff',width:18,height:18,borderRadius:'50%',fontSize:10,padding:0}}>✕</button>
            </div>
          );})}
        </div>
      )}
      <div style={{marginBottom:12}}>
        <button onClick={function(){fileRef.current.click();}} style={{background:COLORS.bo,color:COLORS.tx,padding:'6px 12px',fontSize:12}}>📷 Add Images</button>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={handleImg}/>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {!item.completed?<button onClick={function(){onComplete(item);}} style={{background:COLORS.gr+'22',color:COLORS.gr,border:'1px solid '+COLORS.gr+'44',padding:'7px 14px',fontSize:12}}>Mark Complete</button>:null}
        <button onClick={function(){onDelete(item.id);}} style={{background:COLORS.rd+'22',color:COLORS.rd,border:'1px solid '+COLORS.rd+'44',padding:'7px 14px',fontSize:12}}>🗑 Delete</button>
      </div>
    </div>
  );
}

function DetailPanel({selectedItem,tasks,reminders,goals,cats,onClose,onTaskToggle,onTaskUpdate,onTaskDelete,onTaskAdd,onReminderSave,onReminderDelete,onReminderDismiss,onReminderDefer,onGoalSave,onGoalDelete,onGoalComplete,onTaskSwap}){
  var item=null;
  if(selectedItem.type==='task') item=tasks.find(function(t){return t.id===selectedItem.id;});
  else if(selectedItem.type==='reminder') item=reminders.find(function(r){return r.id===selectedItem.id;});
  else if(selectedItem.type==='goal') item=goals.find(function(g){return g.id===selectedItem.id;});
  if(!item) return null;
  var typeLabel=selectedItem.type==='task'?'📋 Task':selectedItem.type==='reminder'?'🔔 Reminder':'🎯 Goal';
  return(
    <div style={{width:540,flexShrink:0,borderLeft:'1px solid '+COLORS.bo,background:COLORS.su,display:'flex',flexDirection:'column',overflowY:'hidden'}}>
      <div style={{padding:'14px 18px',borderBottom:'1px solid '+COLORS.bo,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
        <span style={{fontSize:13,fontWeight:'bold',color:COLORS.te}}>{typeLabel}</span>
        <button onClick={onClose} style={{background:'transparent',color:COLORS.mu,fontSize:18,padding:'0 4px'}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'16px 18px'}}>
        {selectedItem.type==='task'?<TaskDetail item={item} cats={cats} onToggle={onTaskToggle} onUpdate={onTaskUpdate} onDelete={onTaskDelete} onClose={onClose}/>:null}
        {selectedItem.type==='reminder'?<ReminderDetail item={item} cats={cats} onSave={onReminderSave} onDelete={onReminderDelete} onDismiss={onReminderDismiss} onDefer={onReminderDefer} onClose={onClose}/>:null}
        {selectedItem.type==='goal'?<GoalDetail item={item} cats={cats} onSave={onGoalSave} onDelete={onGoalDelete} onComplete={onGoalComplete} onClose={onClose} tasks={tasks} onTaskAdd={onTaskAdd} onTaskUpdate={onTaskUpdate} onTaskDelete={onTaskDelete} onTaskSwap={onTaskSwap}/>:null}
      </div>
    </div>
  );
}

// ─── DESKTOP SIDEBAR ─────────────────────────────────────────────
function DesktopSidebar({tab,setTab,hasOverdue,tasks,reminders,goals,settings,onShowAI,onShowSettings}){
  var tabs=[{id:'dashboard',icon:'🏠',label:'Dashboard'},{id:'reminders',icon:'🔔',label:'Reminders'},{id:'goals',icon:'🎯',label:'Goals'},{id:'notes',icon:'📝',label:'Notes'}];
  var now=new Date();
  var todayActive=tasks.filter(function(t){return t.date===TODAY&&!t.done;}).length;
  var todayDone=tasks.filter(function(t){return t.date===TODAY&&t.done;}).length;
  var todayTotal=todayActive+todayDone;
  var overdueR=reminders.filter(function(r){return!r.dismissed&&new Date(r.datetime)<now;}).length;
  var upcomingR=reminders.filter(function(r){return!r.dismissed&&new Date(r.datetime)>=now;}).length;
  var activeG=goals.filter(function(g){return!g.completed;}).length;
  return(
    <div style={{position:'fixed',top:0,left:0,bottom:0,width:220,background:COLORS.su,borderRight:'1px solid '+COLORS.bo,display:'flex',flexDirection:'column',zIndex:50,overflowY:'auto'}}>
      {/* Logo */}
      <div style={{padding:'18px 16px 14px',borderBottom:'1px solid '+COLORS.bo}}>
        <div style={{fontSize:18,fontWeight:'bold',color:COLORS.te,letterSpacing:1}}>🧭 WAYPOINT</div>
        <div style={{fontSize:9,color:COLORS.mu,letterSpacing:2,marginTop:2}}>PERSONAL COMMAND CENTER</div>
      </div>

      {/* Nav */}
      <div style={{padding:'10px 8px'}}>
        {tabs.map(function(t){
          var active=tab===t.id;
          return(
            <button key={t.id} onClick={function(){setTab(t.id);}} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:8,background:active?COLORS.te+'22':'transparent',color:active?COLORS.te:COLORS.mu,fontSize:14,textAlign:'left',marginBottom:2,position:'relative'}}>
              <span style={{fontSize:18}}>{t.icon}</span>
              <span style={{fontWeight:active?'bold':'normal'}}>{t.label}</span>
              {t.id==='reminders'&&hasOverdue&&<span style={{position:'absolute',right:10,top:'50%',marginTop:-4,width:8,height:8,borderRadius:'50%',background:COLORS.rd}}/>}
            </button>
          );
        })}
      </div>

      {/* Today Summary */}
      <div style={{margin:'8px 12px',padding:'12px',background:COLORS.ca,borderRadius:10,border:'1px solid '+COLORS.bo}}>
        <div className="section-label" style={{marginBottom:10}}>TODAY AT A GLANCE</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:COLORS.mu}}>Tasks</span>
            <span style={{fontSize:13,color:COLORS.bl,fontWeight:'bold'}}>{todayDone}/{todayTotal}</span>
          </div>
          {todayTotal>0&&(
            <div style={{height:4,background:COLORS.bo,borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:(todayTotal>0?Math.round((todayDone/todayTotal)*100):0)+'%',background:COLORS.bl,borderRadius:2}}/>
            </div>
          )}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:COLORS.mu}}>Reminders</span>
            <span style={{fontSize:13,color:overdueR>0?COLORS.rd:COLORS.te,fontWeight:'bold'}}>{overdueR>0?overdueR+' overdue':upcomingR+' upcoming'}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:COLORS.mu}}>Goals</span>
            <span style={{fontSize:13,color:COLORS.pu,fontWeight:'bold'}}>{activeG} active</span>
          </div>
        </div>
      </div>

      {/* Spacer */}
      <div style={{flex:1}}/>

      {/* Bottom actions */}
      <div style={{padding:'12px 8px',borderTop:'1px solid '+COLORS.bo,display:'flex',flexDirection:'column',gap:6}}>
        <button onClick={onShowAI} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,background:COLORS.bo,color:settings.aiEngine==='gemini'?COLORS.te:COLORS.pu,fontSize:13,border:'1px solid '+(settings.aiEngine==='gemini'?COLORS.te:COLORS.pu)+'44',textAlign:'left'}}>
          <span>●</span><span>{settings.aiEngine==='gemini'?'Gemini':'Groq'} Assistant</span>
        </button>
        <button onClick={onShowSettings} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,background:COLORS.bo,color:COLORS.mu,fontSize:13,textAlign:'left'}}>
          <span>⚙</span><span>Settings</span>
        </button>
      </div>
    </div>
  );
}


function BottomNav({tab,setTab,hasOverdue}){
  const tabs=[{id:'dashboard',icon:'🏠',label:'Dashboard'},{id:'reminders',icon:'🔔',label:'Reminders'},{id:'goals',icon:'🎯',label:'Goals'},{id:'notes',icon:'📝',label:'Notes'}];
  return(
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:COLORS.su,borderTop:`1px solid ${COLORS.bo}`,display:'flex',zIndex:100,maxWidth:600,margin:'0 auto'}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:'transparent',color:tab===t.id?COLORS.te:COLORS.mu,padding:'10px 0',fontSize:11,display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative'}}>
          <span style={{fontSize:20,position:'relative'}}>
            {t.icon}
            {t.id==='reminders'&&hasOverdue&&<span style={{position:'absolute',top:-2,right:-4,width:8,height:8,borderRadius:'50%',background:COLORS.rd}}/>}
          </span>
          {t.label}
        </button>
      ))}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────
// ─── DATE NAVIGATOR ──────────────────────────────────────────────
function DateNav({selectedDate,setSelectedDate}){
  function shift(days){
    var d=new Date(selectedDate+'T12:00:00');
    d.setDate(d.getDate()+days);
    setSelectedDate(d.toISOString().split('T')[0]);
  }
  var isToday=selectedDate===TODAY;
  var d=new Date(selectedDate+'T12:00:00');
  var isFuture=selectedDate>TODAY;
  var label=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  return(
    <div style={{background:COLORS.su,borderBottom:'1px solid '+COLORS.bo,padding:'7px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
      <button onClick={function(){shift(-1);}} style={{background:COLORS.bo,color:COLORS.tx,width:34,height:34,borderRadius:8,fontSize:20}}>‹</button>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {!isToday&&isFuture&&<span style={{fontSize:10,color:COLORS.yl,letterSpacing:1,textTransform:'uppercase'}}>Future</span>}
        {!isToday&&!isFuture&&<span style={{fontSize:10,color:COLORS.mu,letterSpacing:1,textTransform:'uppercase'}}>Past</span>}
        <span style={{fontSize:14,fontWeight:'bold',color:isToday?COLORS.te:COLORS.tx}}>{label}</span>
        {!isToday&&<button onClick={function(){setSelectedDate(TODAY);}} style={{background:COLORS.te,color:'#111',padding:'2px 9px',borderRadius:10,fontSize:11,fontWeight:'bold'}}>Today</button>}
      </div>
      <button onClick={function(){shift(1);}} style={{background:COLORS.bo,color:COLORS.tx,width:34,height:34,borderRadius:8,fontSize:20}}>›</button>
    </div>
  );
}

function App(){
  const w=useWindowWidth();
  const isDesktop=w>=900;
  const isMobile=!isDesktop;
  const[tab,setTab]=useState('dashboard');
  const[showSettings,setShowSettings]=useState(false);
  const[showAdd,setShowAdd]=useState(false);
  const[showAI,setShowAI]=useState(false);
  const[selectedDate,setSelectedDate]=useState(TODAY);
  const[storageReady,setStorageReady]=useState(false);
  const[tasks,setTasksRaw]=useState([]);
  const[reminders,setRemindersRaw]=useState([]);
  const[goals,setGoalsRaw]=useState([]);
  const[cats,setCatsRaw]=useState(DEFAULT_CATEGORIES);
  const[settings,setSettingsRaw]=useState(DEFAULT_SETTINGS);
  const[notes,setNotesRaw]=useState([]);
  const[payments,setPaymentsRaw]=useState([]);
  const[syncStatus,setSyncStatus]=useState('idle');
  const[syncMsg,setSyncMsg]=useState('');
  const[lastSynced,setLastSynced]=useState(load('waypoint_lastSynced',null));
  const[selectedItem,setSelectedItem]=useState(null);

  // Load once on mount, then apply carry-forward
  useEffect(()=>{
    const t=load('waypoint_tasks',[]);
    const carried=applyCarryForward(t);
    setTasksRaw(carried);
    setRemindersRaw(load('waypoint_reminders',[]));
    setGoalsRaw(load('waypoint_goals',[]).map(function(g){return {...g,milestones:g.milestones||[],images:g.images||[]};}));
    setCatsRaw(load('waypoint_categories',DEFAULT_CATEGORIES));
    setSettingsRaw(load('waypoint_settings',DEFAULT_SETTINGS));
    setNotesRaw(load('waypoint_notes',[]));
    setPaymentsRaw(load('waypoint_payments',[]));
    setStorageReady(true);
  },[]);

  // Guarded auto-saves (debounced 600ms)
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveAny('waypoint_tasks',tasks),600);return()=>clearTimeout(t);},[tasks,storageReady]);
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveAny('waypoint_reminders',reminders),600);return()=>clearTimeout(t);},[reminders,storageReady]);
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveAny('waypoint_goals',goals),600);return()=>clearTimeout(t);},[goals,storageReady]);
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveAny('waypoint_categories',cats),600);return()=>clearTimeout(t);},[cats,storageReady]);
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveAny('waypoint_settings',settings),600);return()=>clearTimeout(t);},[settings,storageReady]);
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveAny('waypoint_notes',notes),600);return()=>clearTimeout(t);},[notes,storageReady]);
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveAny('waypoint_payments',payments),600);return()=>clearTimeout(t);},[payments,storageReady]);

  // Midnight watcher — if date rolls over while app is open, reload so TODAY recalculates
  useEffect(function(){
    var startDate=getLocalDateStr();
    var iv=setInterval(function(){
      var nowDate=getLocalDateStr();
      if(nowDate!==startDate){window.location.reload();}
    },60000);
    return function(){clearInterval(iv);};
  },[]);

  // Clear panel when tab changes
  useEffect(function(){setSelectedItem(null);},[tab]);

  function setTasks(v){setTasksRaw(v);}
  function setReminders(v){setRemindersRaw(v);}
  function normalizeGoal(g){return {...g,milestones:g.milestones||[],images:g.images||[]};}
  function setGoals(v){setGoalsRaw(v.map(normalizeGoal));}
  function setCats(v){setCatsRaw(v);}
  function setSettings(v){setSettingsRaw(v);}

  // ─── SYNC ────────────────────────────────────────────────────────
  function mergeCollection(local,remote){
    var merged={};
    local.forEach(function(item){merged[item.id]=item;});
    remote.forEach(function(item){
      if(!merged[item.id]){merged[item.id]=item;}
      else{var lt=merged[item.id].updatedAt||0;var rt=item.updatedAt||0;if(rt>lt)merged[item.id]=item;}
    });
    return Object.keys(merged).map(function(k){return merged[k];});
  }

  function pushToGist(){
    var token=settings.gistToken;var gistId=settings.gistId;
    if(!token||!gistId){setSyncStatus('error');setSyncMsg('Enter PAT + Gist ID in Sync settings first');return;}
    setSyncStatus('syncing');setSyncMsg('Pushing...');
    var payload={tasks:tasks,reminders:reminders,goals:goals,cats:cats,notes:notes,payments:payments,lastModified:new Date().toISOString()};
    var content=JSON.stringify(payload,null,2);
    var LIMIT=800*1024;
    if(content.length>LIMIT){
      var stripped={tasks:tasks.map(function(t){return {...t,images:[]};}),reminders:reminders.map(function(r){return {...r,images:[]};}),goals:goals.map(function(g){return {...g,images:[]};}),cats:cats,notes:notes,payments:payments,lastModified:new Date().toISOString(),imagesStripped:true};
      content=JSON.stringify(stripped,null,2);
    }
    fetch('https://api.github.com/gists/'+gistId,{
      method:'PATCH',
      headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
      body:JSON.stringify({files:{'waypoint-data.json':{content:content}}})
    })
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.id){
        var ts=new Date().toISOString();
        setLastSynced(ts);saveAny('waypoint_lastSynced',ts);
        setSyncStatus('ok');setSyncMsg('Pushed '+ts.slice(11,16)+'Z');
      } else {
        setSyncStatus('error');setSyncMsg(d.message||'Push failed');
      }
    })
    .catch(function(){setSyncStatus('error');setSyncMsg('Network error');});
  }

  function pullFromGist(){
    var token=settings.gistToken;var gistId=settings.gistId;
    if(!token||!gistId){setSyncStatus('error');setSyncMsg('Enter PAT + Gist ID in Sync settings first');return;}
    setSyncStatus('syncing');setSyncMsg('Pulling...');
    fetch('https://api.github.com/gists/'+gistId,{headers:{'Authorization':'token '+token}})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.files||!d.files['waypoint-data.json']){setSyncStatus('error');setSyncMsg('File not found in Gist');return;}
      var file=d.files['waypoint-data.json'];
      // GitHub truncates large files — must fetch raw_url instead
      function applyRemote(text){
        var remote;
        try{remote=JSON.parse(text);}
        catch(e){setSyncStatus('error');setSyncMsg('JSON parse error — data may be corrupted');return;}
        if(remote.tasks)setTasksRaw(mergeCollection(tasks,remote.tasks));
        if(remote.reminders)setRemindersRaw(mergeCollection(reminders,remote.reminders));
        if(remote.goals)setGoalsRaw(mergeCollection(goals,remote.goals).map(function(g){return {...g,milestones:g.milestones||[],images:g.images||[]};}));
        if(remote.notes)setNotesRaw(mergeCollection(notes,remote.notes));
        if(remote.payments)setPaymentsRaw(mergeCollection(payments,remote.payments));
        var ts=new Date().toISOString();
        setLastSynced(ts);saveAny('waypoint_lastSynced',ts);
        setSyncStatus('ok');setSyncMsg('Pulled '+ts.slice(11,16)+'Z');
      }
      if(file.truncated||!file.content){
        // Content truncated — fetch raw
        fetch(file.raw_url)
        .then(function(r){
          if(!r.ok){setSyncStatus('error');setSyncMsg('Raw fetch failed ('+r.status+')');return null;}
          return r.text();
        })
        .then(function(text){if(text)applyRemote(text);})
        .catch(function(e){setSyncStatus('error');setSyncMsg('Raw fetch error: '+(e&&e.message||'unknown'));});
      } else {
        applyRemote(file.content);
      }
    })
    .catch(function(e){setSyncStatus('error');setSyncMsg('Network error: '+(e&&e.message||'unknown'));});
  }

  // Ref keeps auto-sync interval pointing at latest push function
  var autoSyncRef=useRef(null);
  autoSyncRef.current=pushToGist;
  useEffect(function(){
    if(!settings.gistToken||!settings.gistId)return;
    if(settings.deviceType==='pc')return; // PC: manual sync only
    var iv=setInterval(function(){autoSyncRef.current();},5*60*1000);
    return function(){clearInterval(iv);};
  },[settings.gistToken,settings.gistId,settings.deviceType]);

  const hasOverdue=reminders.some(r=>!r.dismissed&&new Date(r.datetime)<new Date());

  function handleTaskToggle(id){
    var toggled=tasks.find(function(t){return t.id===id;});
    var newDone=toggled?!toggled.done:false;
    var newTasks=tasks.map(function(t){return t.id===id?{...t,done:!t.done,updatedAt:Date.now()}:t;});
    setTasks(newTasks);
    if(toggled&&toggled.goalRef&&newDone){
      var ref=toggled.goalRef;
      var mileTasks=newTasks.filter(function(t){return t.goalRef&&t.goalRef.milestoneId===ref.milestoneId;});
      if(mileTasks.length>0&&mileTasks.every(function(t){return t.done;})){
        setGoals(goals.map(function(g){
          if(g.id!==ref.goalId)return g;
          var updMiles=g.milestones.map(function(m){return m.id===ref.milestoneId?{...m,done:true}:m;});
          return{...g,milestones:updMiles,updatedAt:Date.now()};
        }));
      }
    }
  }
  function handleTaskUpdate(task){
    var newTasks=tasks.map(function(t){return t.id===task.id?{...task,updatedAt:Date.now()}:t;});
    setTasks(newTasks);
    if(task.goalRef&&task.done){
      var ref=task.goalRef;
      var mileTasks=newTasks.filter(function(t){return t.goalRef&&t.goalRef.milestoneId===ref.milestoneId;});
      if(mileTasks.length>0&&mileTasks.every(function(t){return t.done;})){
        setGoals(goals.map(function(g){
          if(g.id!==ref.goalId)return g;
          var updMiles=g.milestones.map(function(m){return m.id===ref.milestoneId?{...m,done:true}:m;});
          return{...g,milestones:updMiles,updatedAt:Date.now()};
        }));
      }
    }
  }
  function handleTaskDelete(id){setTasks(tasks.filter(t=>t.id!==id));setSelectedItem(null);}
  function handleTaskSwap(id1,id2){var arr=tasks.slice();var i1=arr.findIndex(function(t){return t.id===id1;});var i2=arr.findIndex(function(t){return t.id===id2;});if(i1<0||i2<0)return;var tmp=arr[i1];arr[i1]=arr[i2];arr[i2]=tmp;setTasks(arr);}
  function handleReminderSave(updated){setReminders(reminders.map(function(r){return r.id===updated.id?{...updated,updatedAt:Date.now()}:r;}));}
  function handleReminderDelete(id){setReminders(reminders.filter(function(r){return r.id!==id;}));setSelectedItem(null);}
  function handleReminderDismiss(reminder){
    if(reminder.recurrence!=='none'){
      var newDT=nextOccurrence(reminder.datetime,reminder.recurrence);
      setReminders(reminders.map(function(r){return r.id===reminder.id?{...r,datetime:newDT,dismissed:false,updatedAt:Date.now()}:r;}));
    } else {
      setReminders(reminders.map(function(r){return r.id===reminder.id?{...r,dismissed:true,updatedAt:Date.now()}:r;}));
    }
  }
  function handleReminderDefer(reminder,ms){
    var newDT=new Date(new Date(reminder.datetime).getTime()+ms).toISOString().slice(0,16);
    setReminders(reminders.map(function(r){return r.id===reminder.id?{...r,datetime:newDT,dismissed:false,updatedAt:Date.now()}:r;}));
  }
  function handleGoalSave(updated){setGoals(goals.map(function(g){return g.id===updated.id?{...updated,updatedAt:Date.now()}:g;}));}
  function handleGoalDelete(id){setGoals(goals.filter(function(g){return g.id!==id;}));setSelectedItem(null);}
  function handleGoalComplete(goal){setGoals(goals.map(function(g){return g.id===goal.id?{...g,completed:true,completedDate:new Date().toISOString(),updatedAt:Date.now()}:g;}));}
  function handleNoteAdd(n){setNotesRaw(prev=>[{...n,updatedAt:Date.now()},...prev]);}
  function handleNoteDelete(id){setNotesRaw(prev=>prev.filter(n=>n.id!==id));}

  function handleReset(){
    var keys=['waypoint_tasks','waypoint_reminders','waypoint_goals','waypoint_categories','waypoint_settings','waypoint_notes','waypoint_lastSynced'];
    keys.forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});
    window.location.reload();
  }

  function handleExport(){
    const data={tasks,reminders,goals,cats,settings,notes,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='waypoint-backup.json';a.click();
  }

  function handleImport(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.tasks)setTasks(d.tasks);
        if(d.reminders)setReminders(d.reminders);
        if(d.goals)setGoals(d.goals);
        if(d.cats)setCats(d.cats);
        if(d.settings)setSettings(d.settings);
        if(d.notes)setNotesRaw(d.notes);
        alert('Backup imported successfully.');
      }catch{alert('Invalid backup file.');}
    };
    r.readAsText(file);
  }

  return(
    <div style={{display:'flex',minHeight:'100vh',background:COLORS.bg}}>
      {/* Desktop sidebar */}
      {isDesktop&&<DesktopSidebar tab={tab} setTab={setTab} hasOverdue={hasOverdue} tasks={tasks} reminders={reminders} goals={goals} settings={settings} onShowAI={()=>setShowAI(true)} onShowSettings={()=>setShowSettings(true)}/>}

      {/* Main content */}
      <div style={{flex:1,marginLeft:isDesktop?220:0,minWidth:0,display:'flex',flexDirection:'column',minHeight:'100vh'}}>

        {/* Mobile header only */}
        {isMobile&&(
          <div style={{background:COLORS.su,borderBottom:'1px solid '+COLORS.bo,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
            <div>
              <div style={{fontSize:18,fontWeight:'bold',color:COLORS.te,letterSpacing:1}}>🧭 WAYPOINT</div>
              <div style={{fontSize:10,color:COLORS.mu,letterSpacing:2}}>PERSONAL COMMAND CENTER</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <button onClick={()=>setShowAI(true)} style={{background:COLORS.bo,color:settings.aiEngine==='gemini'?COLORS.te:COLORS.pu,padding:'5px 10px',borderRadius:8,fontSize:11,border:`1px solid ${settings.aiEngine==='gemini'?COLORS.te:COLORS.pu}44`}}>● {settings.aiEngine==='gemini'?'Gemini':'Groq'}</button>
              <button onClick={()=>setShowSettings(true)} style={{background:COLORS.bo,color:COLORS.mu,width:34,height:34,borderRadius:8,fontSize:16}}>⚙</button>
            </div>
          </div>
        )}

        {/* Desktop page header bar */}
        {isDesktop&&(
          <div style={{background:COLORS.su,borderBottom:'1px solid '+COLORS.bo,padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
            <div style={{fontSize:16,fontWeight:'bold',color:COLORS.tx,letterSpacing:0.5}}>
              {tab==='dashboard'&&'🏠 Dashboard'}
              {tab==='reminders'&&'🔔 Reminders'}
              {tab==='goals'&&'🎯 Goals'}
              {tab==='notes'&&'📝 Notes'}
            </div>
            <div style={{fontSize:12,color:COLORS.mu}}>{getDayStr()}</div>
          </div>
        )}

        {/* Date Navigator — sticky, all tabs */}
        <DateNav selectedDate={selectedDate} setSelectedDate={setSelectedDate}/>

        {/* Content area */}
        <div style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'row',minHeight:0}}>
          <div style={{flex:1,overflowY:'auto',maxWidth:isDesktop?'none':600,margin:isDesktop?0:'0 auto',width:'100%'}}>
            {tab==='dashboard'&&<Dashboard tasks={tasks} reminders={reminders} goals={goals} cats={cats} onTaskToggle={handleTaskToggle} onTaskUpdate={handleTaskUpdate} onTaskDelete={handleTaskDelete} isDesktop={isDesktop} selectedDate={selectedDate} selectedItem={selectedItem} setSelectedItem={setSelectedItem} panelOpen={!!(isDesktop&&selectedItem)} onReminderSave={handleReminderSave} onReminderDelete={handleReminderDelete} onReminderDismiss={handleReminderDismiss} onReminderDefer={handleReminderDefer}/>}
            {tab==='reminders'&&<RemindersModule reminders={reminders} setReminders={setReminders} cats={cats} isDesktop={isDesktop} selectedDate={selectedDate} selectedItem={selectedItem} setSelectedItem={setSelectedItem} panelOpen={!!(isDesktop&&selectedItem)} payments={payments} setPayments={function(v){setPaymentsRaw(v);}}/>}
            {tab==='goals'&&<GoalsModule goals={goals} setGoals={setGoals} cats={cats} isDesktop={isDesktop} selectedItem={selectedItem} setSelectedItem={setSelectedItem} panelOpen={!!(isDesktop&&selectedItem)} tasks={tasks} onTaskAdd={function(t){setTasks([...tasks,t]);}} onTaskUpdate={handleTaskUpdate} onTaskDelete={handleTaskDelete} onTaskSwap={handleTaskSwap}/>}
            {tab==='notes'&&<NotesModule notes={notes} onAdd={handleNoteAdd} onDelete={handleNoteDelete} isDesktop={isDesktop}/>}
          </div>
          {isDesktop&&selectedItem&&(
            <DetailPanel
              selectedItem={selectedItem}
              tasks={tasks} reminders={reminders} goals={goals} cats={cats}
              onClose={function(){setSelectedItem(null);}}
              onTaskToggle={handleTaskToggle}
              onTaskUpdate={handleTaskUpdate}
              onTaskDelete={handleTaskDelete}
              onTaskAdd={function(t){setTasks([...tasks,t]);}}
              onReminderSave={handleReminderSave}
              onReminderDelete={handleReminderDelete}
              onReminderDismiss={handleReminderDismiss}
              onReminderDefer={handleReminderDefer}
              onGoalSave={handleGoalSave}
              onGoalDelete={handleGoalDelete}
              onGoalComplete={handleGoalComplete}
              onTaskSwap={handleTaskSwap}
            />
          )}
        </div>

        {isMobile&&<BottomNav tab={tab} setTab={setTab} hasOverdue={hasOverdue}/>}
      </div>

      {/* FAB */}
      <button onClick={()=>setShowAdd(true)} style={{position:'fixed',bottom:isMobile?70:24,right:24,width:52,height:52,borderRadius:'50%',background:COLORS.te,color:'#111',fontSize:26,fontWeight:'bold',boxShadow:'0 4px 16px rgba(20,184,166,.4)',zIndex:200}}>+</button>

      {showAI&&<AIAssistant settings={settings} onSettingsUpdate={setSettings} tasks={tasks} reminders={reminders} goals={goals} notes={notes} cats={cats} onClose={function(){setShowAI(false);}}
        onTaskAdd={function(t){setTasks([...tasks,t]);}}
        onTaskUpdate={handleTaskUpdate}
        onTaskDelete={handleTaskDelete}
        onReminderAdd={function(r){setReminders([...reminders,r]);}}
        onReminderSave={handleReminderSave}
        onReminderDelete={handleReminderDelete}
        onGoalAdd={function(g){setGoals([...goals,g]);}}
        onGoalSave={handleGoalSave}
        onGoalDelete={handleGoalDelete}
        onNoteAdd={handleNoteAdd}
        onNoteDelete={handleNoteDelete}
      />}
      {showSettings&&<SettingsModal settings={settings} onSave={setSettings} cats={cats} onCatSave={setCats} onClose={function(){setShowSettings(false);}} onExport={handleExport} onImport={handleImport} onPush={pushToGist} onPull={pullFromGist} onSyncSave={function(v){setSettings({...settings,...v});}} syncStatus={syncStatus} syncMsg={syncMsg} lastSynced={lastSynced} onReset={handleReset}/>}
      {showAdd&&<QuickAddModal cats={cats} selectedDate={selectedDate} onAddTask={t=>{setTasks([...tasks,t]);}} onAddReminder={r=>{setReminders([...reminders,r]);}} onAddGoal={g=>{setGoals([...goals,g]);}} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
