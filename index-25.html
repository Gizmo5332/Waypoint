<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0d1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>🧭 WAYPOINT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0d1117;color:#eef1fa;font-family:'Courier New',Courier,monospace;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#0d1117;}
::-webkit-scrollbar-thumb{background:#2e3347;border-radius:2px;}
input,textarea,select{font-family:'Courier New',Courier,monospace;color:#eef1fa;background:#1a1f2e;border:1px solid #2e3347;border-radius:6px;padding:8px 10px;font-size:14px;outline:none;width:100%;}
input:focus,textarea:focus,select:focus{border-color:#14b8a6;}
button{font-family:'Courier New',Courier,monospace;cursor:pointer;border:none;border-radius:6px;font-size:13px;transition:opacity .15s,transform .1s;}
button:active{transform:scale(.96);}
.flash{animation:flash .25s ease;}
@keyframes flash{0%{opacity:1;}50%{opacity:.5;}100%{opacity:1;}}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:bold;letter-spacing:.5px;}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #2e3347;background:transparent;color:#8b90a8;transition:all .15s;}
.pill.active{background:#14b8a6;color:#0d1117;border-color:#14b8a6;font-weight:bold;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#161b27;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px;}
.modal-box.center{border-radius:16px;align-self:center;margin:16px;}
.modal-handle{width:40px;height:4px;background:#2e3347;border-radius:2px;margin:0 auto 16px;}
.section-label{font-size:11px;letter-spacing:1.5px;color:#8b90a8;text-transform:uppercase;margin-bottom:8px;}
.card{background:#161b27;border:1px solid #2e3347;border-radius:10px;padding:12px 14px;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ─── CONSTANTS ───────────────────────────────────────────────────
const COLORS={bg:'#0d1117',su:'#161b27',ca:'#1a1f2e',bo:'#2e3347',te:'#14b8a6',gr:'#22c55e',rd:'#ef4444',yl:'#eab308',bl:'#3b82f6',pu:'#a855f7',tx:'#eef1fa',mu:'#8b90a8'};
function getLocalDateStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
const TODAY=getLocalDateStr();
const PRIORITY_COLOR={High:COLORS.rd,Medium:COLORS.yl,Low:COLORS.gr};
const GOAL_CAT_COLOR={'Health':COLORS.gr,'Financial':COLORS.yl,'Personal Growth':COLORS.te,'Family':COLORS.bl,'Career':COLORS.pu};
const CAT_COLORS=['#14b8a6','#22c55e','#ef4444','#eab308','#3b82f6','#a855f7','#f97316','#ec4899','#06b6d4','#8b90a8'];

const DEFAULT_CATEGORIES=[
  {id:1,label:'Personal',color:COLORS.te},
  {id:2,label:'Family',color:COLORS.bl},
  {id:3,label:'Health',color:COLORS.gr},
  {id:4,label:'Financial',color:COLORS.yl},
  {id:5,label:'Kids',color:COLORS.pu},
];

const DEFAULT_SETTINGS={name:'Jesse',notificationsEnabled:true,geminiApiKey:'',groqApiKey:'',gistToken:'',gistId:'',aiEngine:'gemini',aiEngineForcedGroqUntil:null,closePhrase:'hey waypoint close',deviceType:'phone'};

// ─── STORAGE ─────────────────────────────────────────────────────
function load(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch{return fallback;}}
// Write guard: never let a smaller array overwrite a larger saved one
function saveGuarded(key,val){
  try{
    const existing=JSON.parse(localStorage.getItem(key)||'[]');
    if(Array.isArray(existing)&&Array.isArray(val)&&existing.length>val.length){
      console.warn('[WAYPOINT] save blocked — would reduce',key);return;
    }
    localStorage.setItem(key,JSON.stringify(val));
  }catch{}
}
function saveAny(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}

// ─── CARRY-FORWARD ───────────────────────────────────────────────
function applyCarryForward(tasks){
  const pastIncomplete=tasks.filter(t=>t.date<TODAY&&!t.done);
  if(!pastIncomplete.length)return tasks;
  const todayIds=new Set(tasks.filter(t=>t.date===TODAY).map(t=>t.id));
  const toCarry=pastIncomplete.filter(t=>!todayIds.has(t.id)).map(t=>({...t,date:TODAY,carried:true}));
  // Remove old copies, add carried versions for today
  const cleaned=tasks.filter(t=>!toCarry.find(c=>c.id===t.id));
  return [...cleaned,...toCarry];
}

// ─── HOOKS ───────────────────────────────────────────────────────
function useWindowWidth(){const[w,setW]=useState(window.innerWidth);useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);return w;}

// ─── UTILS ───────────────────────────────────────────────────────
function fmtDate(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtDateTime(dt){if(!dt)return'';const d=new Date(dt);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function getDayGreeting(){const h=new Date().getHours();if(h<12)return'Good morning';if(h<17)return'Good afternoon';return'Good evening';}
function getDayStr(){return new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function msUntil(dtStr){return new Date(dtStr)-new Date();}
function fmtCountdown(ms){if(ms<=0)return'NOW';const m=Math.floor(ms/60000);const h=Math.floor(m/60);const d=Math.floor(h/24);if(d>0)return`${d}d ${h%24}h`;if(h>0)return`${h}h ${m%60}m`;return`${m}m`;}
function getCatColor(cats,label){const c=cats.find(x=>x.label===label);return c?c.color:COLORS.mu;}

// ─── IMAGE COMPRESSION ───────────────────────────────────────────
function compressImage(dataURL,maxPx,quality){
  return new Promise(function(resolve){
    var img=new window.Image();
    img.onload=function(){
      var w=img.width;var h=img.height;
      var scale=Math.min(1,maxPx/Math.max(w,h));
      var cw=Math.round(w*scale);var ch=Math.round(h*scale);
      var canvas=document.createElement('canvas');
      canvas.width=cw;canvas.height=ch;
      var ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,cw,ch);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=function(){resolve(dataURL);};
    img.src=dataURL;
  });
}

// ─── COMPONENTS ──────────────────────────────────────────────────

function CatBadge({label,cats}){
  const color=getCatColor(cats,label);
  return <span className="badge" style={{background:color+'22',color,border:`1px solid ${color}44`}}>{label}</span>;
}

function PriBadge({priority}){
  const c=PRIORITY_COLOR[priority]||COLORS.mu;
  return <span className="badge" style={{background:c+'22',color:c,border:`1px solid ${c}44`}}>{priority}</span>;
}

// ─── COUNTDOWN CARD ──────────────────────────────────────────────
function CountdownCard({label,value,sub,color}){
  return(
    <div className="card" style={{minWidth:130,flexShrink:0,borderColor:color+'44'}}>
      <div style={{fontSize:11,color:COLORS.mu,letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>{label}</div>
      <div style={{fontSize:20,fontWeight:'bold',color}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:COLORS.mu,marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{sub}</div>}
    </div>
  );
}

// ─── TASK ITEM ───────────────────────────────────────────────────
function TaskItem({task,cats,onToggle,onUpdate,onDelete,isDesktop,onSelect,isSelected}){
  const[open,setOpen]=useState(false);
  const[notes,setNotes]=useState(task.notes||'');
  const fileRef=useRef();

  function saveNotes(){onUpdate({...task,notes});}

  function handleImg(e){
    const files=Array.from(e.target.files);
    files.forEach(f=>{
      const r=new FileReader();
      r.onload=ev=>{
        compressImage(ev.target.result,800,0.6).then(function(compressed){
          const img={id:Date.now()+Math.random(),base64:compressed,label:'',ocrText:null};
          onUpdate({...task,images:[...(task.images||[]),img]});
        });
      };
      r.readAsDataURL(f);
    });
  }

  function removeImg(imgId){onUpdate({...task,images:(task.images||[]).filter(i=>i.id!==imgId)});}

  function handleRowClick(){
    if(isDesktop&&onSelect){onSelect(task.id);}
    else{setOpen(function(o){return !o;});}
  }

  const pc=PRIORITY_COLOR[task.priority]||COLORS.mu;
  var cardStyle={marginBottom:8,borderLeft:'3px solid '+pc,opacity:task.done?0.7:1};
  if(isSelected){cardStyle.border='1px solid '+COLORS.te;cardStyle.background=COLORS.te+'11';}

  return(
    <div className="card" style={cardStyle}>
      <div style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}} onClick={handleRowClick}>
        <div onClick={e=>{e.stopPropagation();onToggle(task.id);}} style={{width:20,height:20,borderRadius:4,border:`2px solid ${task.done?COLORS.gr:COLORS.bo}`,background:task.done?COLORS.gr:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}>
          {task.done&&<span style={{color:'#111',fontSize:12,fontWeight:'bold'}}>✓</span>}
        </div>
        <span className="dot" style={{background:pc}}/>
        <span style={{flex:1,fontSize:14,textDecoration:task.done?'line-through':'none',color:task.done?COLORS.mu:COLORS.tx}}>{task.text}</span>
        <CatBadge label={task.category} cats={cats}/>
        {task.carried?<span className="badge" style={{background:COLORS.yl+'22',color:COLORS.yl,border:'1px solid '+COLORS.yl+'44',fontSize:10}}>↩ carried</span>:null}
        {task.goalRef?<span className="badge" style={{background:COLORS.pu+'22',color:COLORS.pu,border:'1px solid '+COLORS.pu+'44',fontSize:10}}>↑ Goal</span>:null}
        {!isDesktop&&<span style={{color:COLORS.mu,fontSize:12}}>{open?'▲':'▼'}</span>}
      </div>
      {!isDesktop&&open&&(
        <div style={{marginTop:12,borderTop:`1px solid ${COLORS.bo}`,paddingTop:12}}>
          <div className="section-label">Notes</div>
          <textarea rows={3} value={notes} onChange={e=>setNotes(e.target.value)} onBlur={saveNotes} style={{marginBottom:10,resize:'vertical'}} placeholder="Add notes..."/>
          <div style={{display:'flex',gap:8,marginBottom:10}}>
            <button onClick={()=>fileRef.current.click()} style={{background:COLORS.bo,color:COLORS.tx,padding:'6px 12px'}}>📷 Camera</button>
            <button onClick={()=>{fileRef.current.accept='image/*';fileRef.current.click();}} style={{background:COLORS.bo,color:COLORS.tx,padding:'6px 12px'}}>🖼 Gallery</button>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" multiple style={{display:'none'}} onChange={handleImg}/>
          </div>
          {(task.images||[]).length>0&&(
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10}}>
              {task.images.map(img=>(
                <div key={img.id} style={{position:'relative'}}>
                  <img src={img.base64} style={{width:70,height:70,objectFit:'cover',borderRadius:6,border:`1px solid ${COLORS.bo}`}}/>
                  <button onClick={()=>removeImg(img.id)} style={{position:'absolute',top:-4,right:-4,background:COLORS.rd,color:'#fff',width:18,height:18,borderRadius:'50%',fontSize:10,padding:0}}>✕</button>
                </div>
              ))}
            </div>
          )}
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>onDelete(task.id)} style={{background:COLORS.rd+'22',color:COLORS.rd,border:`1px solid ${COLORS.rd}44`,padding:'5px 12px'}}>Delete</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── GOAL TASK HELPERS ───────────────────────────────────────────
function buildGroups(goalTasks){
  var groups={};
  goalTasks.forEach(function(t){
    var key=String(t.goalRef.milestoneId);
    if(!groups[key]){groups[key]={goalTitle:t.goalRef.goalTitle,milestoneText:t.goalRef.milestoneText,tasks:[]};}
    groups[key].tasks.push(t);
  });
  return groups;
}

function GoalTaskGroup({groupData,cats,onToggle,onUpdate,onDelete,isDesktop,selectedItem,onSelect}){
  var[open,setOpen]=useState(true);
  var done=groupData.tasks.filter(function(t){return t.done;}).length;
  var total=groupData.tasks.length;
  return(
    <div style={{marginBottom:8}}>
      <div onClick={function(){setOpen(function(o){return !o;});}} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',background:COLORS.su,borderRadius:8,cursor:'pointer',border:'1px solid '+COLORS.bo,marginBottom:open?4:0}}>
        <span style={{fontSize:10,color:COLORS.pu,fontWeight:'bold',flexShrink:0}}>&#x2191;</span>
        <span style={{flex:1,fontSize:11,color:COLORS.tx,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{groupData.goalTitle} &#x2192; {groupData.milestoneText}</span>
        <span style={{fontSize:10,color:COLORS.mu,flexShrink:0}}>{done}/{total}</span>
        <span style={{color:COLORS.mu,fontSize:11,flexShrink:0}}>{open?'▲':'▼'}</span>
      </div>
      {open&&(
        <div style={{paddingLeft:8}}>
          {groupData.tasks.map(function(t){
            var isSel=!!(selectedItem&&selectedItem.type==='task'&&selectedItem.id===t.id);
            return <TaskItem key={t.id} task={t} cats={cats} onToggle={onToggle} onUpdate={onUpdate} onDelete={onDelete} isDesktop={isDesktop} onSelect={onSelect} isSelected={isSel}/>;
          })}
        </div>
      )}
    </div>
  );
}

function MilestoneTasksSection({milestone,milestoneIdx,allMilestones,goalId,goalTitle,tasks,onTaskAdd,onTaskUpdate,onTaskDelete,onMoveTask,onReorderTask}){
  var mileTasks=tasks.filter(function(t){return t.goalRef&&t.goalRef.goalId===goalId&&t.goalRef.milestoneId===milestone.id&&!t.goalRef.isMilestoneSelf;});
  var[showAdd,setShowAdd]=useState(false);
  var[newText,setNewText]=useState('');
  var[newDate,setNewDate]=useState('');
  var[newPri,setNewPri]=useState('Medium');
  var[editId,setEditId]=useState(null);
  var[editText,setEditText]=useState('');
  var[editDate,setEditDate]=useState('');
  var[editPri,setEditPri]=useState('Medium');
  var[moveId,setMoveId]=useState(null);

  function addTask(){
    if(!newText.trim())return;
    onTaskAdd({id:Date.now()+Math.random(),text:newText.trim(),priority:newPri,category:'Personal',done:false,date:newDate||null,notes:'',images:[],goalRef:{goalId:goalId,goalTitle:goalTitle,milestoneId:milestone.id,milestoneText:milestone.text},updatedAt:Date.now()});
    setNewText('');setNewDate('');setNewPri('Medium');setShowAdd(false);
  }

  function startEdit(task){setEditId(task.id);setEditText(task.text);setEditDate(task.date||'');setEditPri(task.priority||'Medium');}
  function saveEdit(task){onTaskUpdate({...task,text:editText,date:editDate||null,priority:editPri,updatedAt:Date.now()});setEditId(null);}

  function moveUp(task){onReorderTask(task,milestone.id,'up');}
  function moveDown(task){onReorderTask(task,milestone.id,'down');}

  var otherMilestones=allMilestones.filter(function(m){return m.id!==milestone.id;});

  return(
    <div style={{paddingLeft:24,marginTop:4,marginBottom:4}}>
      {mileTasks.map(function(task,idx){return(
        <div key={task.id} style={{marginBottom:4}}>
          {editId===task.id?(
            <div style={{background:COLORS.ca,borderRadius:6,padding:'8px',border:'1px solid '+COLORS.bo}}>
              <input value={editText} onChange={function(e){setEditText(e.target.value);}} style={{marginBottom:6,fontSize:12}}/>
              <div style={{display:'flex',gap:6,marginBottom:6}}>
                <select value={editPri} onChange={function(e){setEditPri(e.target.value);}} style={{flex:1,fontSize:11,padding:'4px'}}>
                  {['High','Medium','Low'].map(function(p){return <option key={p}>{p}</option>;})}
                </select>
                <input type="date" value={editDate} onChange={function(e){setEditDate(e.target.value);}} style={{flex:1,fontSize:11,padding:'4px'}}/>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={function(){saveEdit(task);}} style={{flex:1,background:COLORS.te,color:'#111',padding:'4px 0',fontSize:12,fontWeight:'bold'}}>Save</button>
                <button onClick={function(){setEditId(null);}} style={{background:COLORS.bo,color:COLORS.mu,padding:'4px 10px',fontSize:12}}>Cancel</button>
              </div>
            </div>
          ):(
            <div style={{display:'flex',alignItems:'center',gap:5,padding:'3px 0',borderBottom:'1px solid '+COLORS.bo+'44'}}>
              <div onClick={function(){onTaskUpdate({...task,done:!task.done,updatedAt:Date.now()});}} style={{width:15,height:15,borderRadius:3,border:'2px solid '+(task.done?COLORS.gr:COLORS.bo),background:task.done?COLORS.gr:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}>
                {task.done&&<span style={{color:'#111',fontSize:9,fontWeight:'bold'}}>✓</span>}
              </div>
              <span style={{flex:1,fontSize:12,color:task.done?COLORS.mu:COLORS.tx,textDecoration:task.done?'line-through':'none',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{task.text}</span>
              {task.date&&<span style={{fontSize:10,color:COLORS.te,flexShrink:0}}>{fmtDate(task.date)}</span>}
              <div style={{display:'flex',gap:2,flexShrink:0}}>
                <button onClick={function(){moveUp(task);}} disabled={idx===0} style={{background:'transparent',color:idx===0?COLORS.bo:COLORS.mu,fontSize:11,padding:'0 2px',lineHeight:1}}>▲</button>
                <button onClick={function(){moveDown(task);}} disabled={idx===mileTasks.length-1} style={{background:'transparent',color:idx===mileTasks.length-1?COLORS.bo:COLORS.mu,fontSize:11,padding:'0 2px',lineHeight:1}}>▼</button>
                <button onClick={function(){startEdit(task);}} style={{background:'transparent',color:COLORS.bl,fontSize:11,padding:'0 2px',lineHeight:1}}>✏</button>
                {otherMilestones.length>0&&(
                  moveId===task.id?(
                    <select onChange={function(e){if(e.target.value){onMoveTask(task,Number(e.target.value));setMoveId(null);}}} style={{fontSize:10,padding:'1px',width:80}} defaultValue="">
                      <option value="" disabled>Move to…</option>
                      {otherMilestones.map(function(m){return <option key={m.id} value={m.id}>{m.text.slice(0,20)}</option>;})}
                    </select>
                  ):(
                    <button onClick={function(){setMoveId(task.id);}} style={{background:'transparent',color:COLORS.pu,fontSize:10,padding:'0 2px',lineHeight:1}}>⇄</button>
                  )
                )}
                <button onClick={function(){onTaskDelete(task.id);}} style={{background:'transparent',color:COLORS.mu,fontSize:11,padding:'0 2px',lineHeight:1}}>✕</button>
              </div>
            </div>
          )}
        </div>
      );})}
      {showAdd?(
        <div style={{marginTop:6,background:COLORS.ca,borderRadius:6,padding:'8px',border:'1px solid '+COLORS.bo}}>
          <input value={newText} onChange={function(e){setNewText(e.target.value);}} placeholder="Task description..." style={{marginBottom:6,fontSize:12}}/>
          <div style={{display:'flex',gap:6,marginBottom:6}}>
            <select value={newPri} onChange={function(e){setNewPri(e.target.value);}} style={{flex:1,fontSize:11,padding:'4px'}}>
              {['High','Medium','Low'].map(function(p){return <option key={p}>{p}</option>;})}
            </select>
            <input type="date" value={newDate} onChange={function(e){setNewDate(e.target.value);}} style={{flex:1,fontSize:11,padding:'4px'}}/>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={addTask} style={{flex:1,background:COLORS.te,color:'#111',padding:'5px 0',fontSize:12,fontWeight:'bold'}}>Add</button>
            <button onClick={function(){setShowAdd(false);setNewText('');setNewDate('');setNewPri('Medium');}} style={{background:COLORS.bo,color:COLORS.mu,padding:'5px 10px',fontSize:12}}>Cancel</button>
          </div>
        </div>
      ):(
        <button onClick={function(){setShowAdd(true);}} style={{marginTop:4,background:'transparent',color:COLORS.te,fontSize:11,padding:'2px 0'}}>+ Add Task</button>
      )}
    </div>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────
function Dashboard({tasks,reminders,goals,cats,onTaskToggle,onTaskUpdate,onTaskDelete,isDesktop,selectedDate,selectedItem,setSelectedItem,panelOpen,onReminderSave,onReminderDelete,onReminderDismiss,onReminderDefer}){
  const dateTasks=tasks.filter(function(t){return t.date===selectedDate;});
  const doneTasks=dateTasks.filter(function(t){return t.done;});
  const activeTasks=dateTasks.filter(function(t){return !t.done;}).sort(function(a,b){
    const order={High:0,Medium:1,Low:2};
    return(order[a.priority]!==undefined?order[a.priority]:3)-(order[b.priority]!==undefined?order[b.priority]:3);
  });
  const[doneOpen,setDoneOpen]=useState(false);
  const[cuSelected,setCuSelected]=useState(null);
  function handleTaskSelect(id){setSelectedItem({type:'task',id:id});}
  function handleReminderClick(r){if(isDesktop){setSelectedItem({type:'reminder',id:r.id});}else{setCuSelected(r.id);}}

  const now=new Date();
  const nextReminder=reminders.filter(function(r){return !r.dismissed&&new Date(r.datetime)>now;}).sort(function(a,b){return new Date(a.datetime)-new Date(b.datetime);})[0];
  const upcomingEvents=reminders.filter(function(r){return !r.dismissed&&new Date(r.datetime)>now;}).sort(function(a,b){return new Date(a.datetime)-new Date(b.datetime);}).slice(0,3);

      <div style={{display:'grid',gridTemplateColumns:isDesktop?(panelOpen?'1fr 1fr':'repeat(4,1fr)'):'1fr 1fr',gap:10,marginBottom:isDesktop?24:16}}>

        <CountdownCard label="Tasks" value={doneTasks.length+'/'+dateTasks.length} sub="completed" color={COLORS.bl}/>
        <CountdownCard label="Active Goals" value={goals.filter(function(g){return !g.completed;}).length} sub="in progress" color={COLORS.pu}/>
        <CountdownCard label="Reminders" value={reminders.filter(function(r){return !r.dismissed;}).length} sub="upcoming" color={COLORS.yl}/>
      </div>

      {isDesktop?(

              <div className="section-label" style={{marginBottom:0}}>TODAY'S TASKS</div>
              <span style={{fontSize:11,color:COLORS.mu}}>{activeTasks.length} active</span>

            {activeTasks.length===0&&doneTasks.length===0&&(
              <div className="card" style={{textAlign:'center',color:COLORS.mu,padding:20}}>No tasks today. Tap + to add one.</div>
            )}
            {renderTaskList(standaloneActive,activeGroups)}
            {doneTasks.length>0&&(
              <div style={{marginBottom:8}}>
                <button onClick={function(){setDoneOpen(function(o){return !o;});}} style={{background:'transparent',color:COLORS.mu,padding:'4px 0',fontSize:12}}>
                  {doneOpen?'▼':'▶'} COMPLETED ({doneTasks.length})
                </button>
                {doneOpen&&renderTaskList(standaloneDone,doneGroups)}
              </div>
            )}
          </div>
          <div>
            {comingUp.length>0&&(
              <div style={{marginBottom:20}}>
                <div className="section-label">COMING UP</div>
                {comingUp.map(function(r){return(
                  <div key={r.id} className="card" style={{marginBottom:8,display:'flex',alignItems:'center',gap:10,cursor:'pointer',border:selectedItem&&selectedItem.type==='reminder'&&selectedItem.id===r.id?'1px solid '+COLORS.te:'1px solid '+COLORS.bo,background:selectedItem&&selectedItem.type==='reminder'&&selectedItem.id===r.id?COLORS.te+'11':COLORS.su}} onClick={function(){handleReminderClick(r);}}>

// ─── PAYMENT REMINDERS ───────────────────────────────────────────
var PAYMENT_CATS=['Utilities','Subscriptions','Loans','Insurance','Rent/Mortgage','Car','Medical','Other'];
var PAYMENT_RECUR=['one-time','weekly','bi-weekly','monthly','quarterly','annually'];

function PaymentRemindersTab({payments,setPayments,isDesktop,onSwitchTab}){
  var[showAdd,setShowAdd]=useState(false);
  var[editId,setEditId]=useState(null);
  var[form,setForm]=useState({title:'',payee:'',amountMin:'',amountMax:'',dueDate:'',recurrence:'monthly',category:'Utilities',paid:false,notes:''});
  var[filter,setFilter]=useState('all');

  function resetForm(){setForm({title:'',payee:'',amountMin:'',amountMax:'',dueDate:'',recurrence:'monthly',category:'Utilities',paid:false,notes:''});}

  function startEdit(p){setEditId(p.id);setForm({title:p.title,payee:p.payee||'',amountMin:p.amountMin||'',amountMax:p.amountMax||'',dueDate:p.dueDate||'',recurrence:p.recurrence||'monthly',category:p.category||'Utilities',paid:p.paid||false,notes:p.notes||''});setShowAdd(true);}

  function savePayment(){
    if(!form.title.trim())return;
    var now=Date.now();
    if(editId){
      setPayments(payments.map(function(p){return p.id===editId?{...p,...form,updatedAt:now}:p;}));
      setEditId(null);
    } else {
      setPayments([...payments,{id:now+Math.random(),...form,updatedAt:now}]);
    }
    resetForm();setShowAdd(false);
  }

  function togglePaid(p){setPayments(payments.map(function(x){return x.id===p.id?{...x,paid:!x.paid,updatedAt:Date.now()}:x;}));}
  function deletePayment(id){setPayments(payments.filter(function(p){return p.id!==id;}));}

  var now=new Date();
  var sorted=payments.slice().sort(function(a,b){return(a.dueDate||'')>(b.dueDate||'')?1:-1;});
  var unpaid=sorted.filter(function(p){return !p.paid;});
  var paid=sorted.filter(function(p){return p.paid;});
  var overdue=unpaid.filter(function(p){return p.dueDate&&new Date(p.dueDate+'T23:59:59')<now;});
  var upcoming=unpaid.filter(function(p){return !p.dueDate||new Date(p.dueDate+'T23:59:59')>=now;});

  var totalMin=unpaid.reduce(function(s,p){return s+(parseFloat(p.amountMin)||0);},0);
  var totalMax=unpaid.reduce(function(s,p){return s+(parseFloat(p.amountMax)||parseFloat(p.amountMin)||0);},0);

  function fmtAmount(p){
    if(p.amountMin&&p.amountMax&&p.amountMin!==p.amountMax)return '$'+p.amountMin+'-$'+p.amountMax;
    if(p.amountMin)return '$'+p.amountMin;
    return '—';
  }

  function PaymentCard({p}){
    var isOverdue=p.dueDate&&new Date(p.dueDate+'T23:59:59')<now&&!p.paid;
    return(
      <div className="card" style={{marginBottom:8,borderLeft:'3px solid '+(p.paid?COLORS.gr:isOverdue?COLORS.rd:COLORS.bl),opacity:p.paid?0.7:1}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
          <div onClick={function(){togglePaid(p);}} style={{width:20,height:20,borderRadius:4,border:'2px solid '+(p.paid?COLORS.gr:COLORS.bo),background:p.paid?COLORS.gr:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer',marginTop:2}}>
            {p.paid&&<span style={{color:'#111',fontSize:12,fontWeight:'bold'}}>✓</span>}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
              <div>
                <div style={{fontSize:14,fontWeight:'bold',color:p.paid?COLORS.mu:COLORS.tx,textDecoration:p.paid?'line-through':'none'}}>{p.title}</div>
                {p.payee&&<div style={{fontSize:11,color:COLORS.mu}}>{p.payee}</div>}
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:14,fontWeight:'bold',color:p.paid?COLORS.mu:COLORS.te}}>{fmtAmount(p)}</div>
                {p.dueDate&&<div style={{fontSize:11,color:isOverdue?COLORS.rd:COLORS.mu}}>{isOverdue?'OVERDUE · ':''}{fmtDate(p.dueDate)}</div>}
              </div>
            </div>
            <div style={{display:'flex',gap:6,marginTop:6,flexWrap:'wrap',alignItems:'center'}}>
              <span className="badge" style={{background:COLORS.bl+'22',color:COLORS.bl,border:'1px solid '+COLORS.bl+'33',fontSize:10}}>{p.category}</span>
              <span className="badge" style={{background:COLORS.bo,color:COLORS.mu,fontSize:10}}>{p.recurrence}</span>
              {p.paid&&<span className="badge" style={{background:COLORS.gr+'22',color:COLORS.gr,border:'1px solid '+COLORS.gr+'33',fontSize:10}}>Paid</span>}
              <button onClick={function(){startEdit(p);}} style={{background:'transparent',color:COLORS.bl,fontSize:11,padding:'0 4px',marginLeft:'auto'}}>✏</button>
              <button onClick={function(){deletePayment(p.id);}} style={{background:'transparent',color:COLORS.mu,fontSize:11,padding:'0 4px'}}>🗑</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{padding:isDesktop?'20px 24px':'12px 14px',paddingBottom:isDesktop?24:80}}>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button onClick={function(){onSwitchTab('personal');}} className="pill">🔔 Personal</button>
        <button className="pill active">💳 Payments</button>
      </div>

      {unpaid.length>0&&(
        <div className="card" style={{marginBottom:16,borderLeft:'3px solid '+COLORS.te}}>
          <div style={{fontSize:11,color:COLORS.mu,marginBottom:4}}>OUTSTANDING BALANCE</div>
          <div style={{fontSize:18,fontWeight:'bold',color:COLORS.te}}>
            {totalMin===totalMax?'$'+totalMin.toFixed(2):'$'+totalMin.toFixed(2)+' – $'+totalMax.toFixed(2)}
          </div>
          <div style={{fontSize:11,color:COLORS.mu,marginTop:2}}>{unpaid.length} unpaid</div>
        </div>
      )}

      {showAdd&&(
        <div className="card" style={{marginBottom:16,border:'1px solid '+COLORS.te+'44'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontSize:13,fontWeight:'bold',color:COLORS.te}}>{editId?'Edit Payment':'Add Payment'}</span>
            <button onClick={function(){setShowAdd(false);setEditId(null);resetForm();}} style={{background:'transparent',color:COLORS.mu,fontSize:16}}>✕</button>
          </div>
          <div className="section-label">Title *</div>
          <input value={form.title} onChange={function(e){setForm({...form,title:e.target.value});}} placeholder="e.g. Electric Bill" style={{marginBottom:8}}/>
          <div className="section-label">Payee / Account</div>
          <input value={form.payee} onChange={function(e){setForm({...form,payee:e.target.value});}} placeholder="e.g. Duke Energy" style={{marginBottom:8}}/>
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <div style={{flex:1}}>
              <div className="section-label">Amount</div>
              <input value={form.amountMin} onChange={function(e){setForm({...form,amountMin:e.target.value});}} placeholder="$0.00" style={{}}/>
            </div>
            <div style={{flex:1}}>
              <div className="section-label">Max (if range)</div>
              <input value={form.amountMax} onChange={function(e){setForm({...form,amountMax:e.target.value});}} placeholder="$0.00" style={{}}/>
            </div>
          </div>
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <div style={{flex:1}}>
              <div className="section-label">Due Date</div>
              <input type="date" value={form.dueDate} onChange={function(e){setForm({...form,dueDate:e.target.value});}} style={{}}/>
            </div>
            <div style={{flex:1}}>
              <div className="section-label">Recurrence</div>
              <select value={form.recurrence} onChange={function(e){setForm({...form,recurrence:e.target.value});}} style={{}}>
                {PAYMENT_RECUR.map(function(r){return <option key={r}>{r}</option>;})}
              </select>
            </div>
          </div>
          <div className="section-label">Category</div>
          <select value={form.category} onChange={function(e){setForm({...form,category:e.target.value});}} style={{marginBottom:8}}>
            {PAYMENT_CATS.map(function(c){return <option key={c}>{c}</option>;})}
          </select>
          <div className="section-label">Notes</div>
          <textarea rows={2} value={form.notes} onChange={function(e){setForm({...form,notes:e.target.value});}} style={{marginBottom:10,resize:'none'}}/>
          <div style={{display:'flex',gap:8}}>
            <button onClick={savePayment} style={{flex:1,background:COLORS.te,color:'#111',padding:'10px 0',fontWeight:'bold'}}>Save</button>
            <button onClick={function(){setShowAdd(false);setEditId(null);resetForm();}} style={{background:COLORS.bo,color:COLORS.mu,padding:'10px 14px'}}>Cancel</button>
          </div>
        </div>
      )}

      {!showAdd&&<button onClick={function(){setShowAdd(true);}} style={{background:COLORS.te,color:'#111',padding:'9px 18px',fontWeight:'bold',marginBottom:16,borderRadius:8}}>+ Add Payment</button>}

      {overdue.length>0&&(
        <div style={{marginBottom:14}}>
          <div className="section-label" style={{color:COLORS.rd}}>⚠ OVERDUE ({overdue.length})</div>
          {overdue.map(function(p){return <PaymentCard key={p.id} p={p}/>;}) }
        </div>
      )}
      {upcoming.length>0&&(
        <div style={{marginBottom:14}}>
          <div className="section-label">UPCOMING ({upcoming.length})</div>
          {upcoming.map(function(p){return <PaymentCard key={p.id} p={p}/>;}) }
        </div>
      )}
      {paid.length>0&&(
        <div>
          <div className="section-label" style={{color:COLORS.mu}}>✓ PAID ({paid.length})</div>
          {paid.map(function(p){return <PaymentCard key={p.id} p={p}/>;}) }
        </div>
      )}
      {payments.length===0&&!showAdd&&(
        <div className="card" style={{textAlign:'center',color:COLORS.mu,padding:20}}>No payments yet. Tap + to add one.</div>
      )}
    </div>
  );
}

// ─── REMINDERS MODULE ────────────────────────────────────────────
function nextOccurrence(datetime,recurrence){
  var d=new Date(datetime);
  if(recurrence==='daily'){d.setDate(d.getDate()+1);}
  else if(recurrence==='weekly'){d.setDate(d.getDate()+7);}
  else if(recurrence==='monthly'){d.setMonth(d.getMonth()+1);}
  return d.toISOString().slice(0,16);
}

function ReminderDetailModal({reminder,cats,onClose,onSave,onDelete,onDismiss,onDefer}){
  var[editing,setEditing]=useState(false);
  var[title,setTitle]=useState(reminder.title);
  var[datetime,setDatetime]=useState(reminder.datetime);
  var[recurrence,setRecurrence]=useState(reminder.recurrence);
  var[category,setCategory]=useState(reminder.category);
  var[notes,setNotes]=useState(reminder.notes||'');
  var[showDefer,setShowDefer]=useState(false);
  var fileRef=useRef();

  function handleImg(e){
    var files=Array.from(e.target.files);
    files.forEach(function(f){
      var r=new FileReader();
      r.onload=function(ev){
        compressImage(ev.target.result,800,0.6).then(function(compressed){
          var img={id:Date.now()+Math.random(),base64:compressed};
          onSave({...reminder,images:[...(reminder.images||[]),img]});
        });
      };
      r.readAsDataURL(f);
    });
  }
  function removeImg(imgId){onSave({...reminder,images:(reminder.images||[]).filter(function(i){return i.id!==imgId;})});}

  function handleSave(){
    onSave({...reminder,title,datetime,recurrence,category,notes});
    setEditing(false);
  }

  var DEFER_OPTS=[{label:'1 hour',ms:3600000},{label:'3 hours',ms:10800000},{label:'1 day',ms:86400000},{label:'1 week',ms:604800000}];

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box center" style={{maxHeight:'85vh',overflowY:'auto'}} onClick={function(e){e.stopPropagation();}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <span style={{fontSize:15,fontWeight:'bold',color:COLORS.te}}>🔔 Reminder</span>
          <button onClick={onClose} style={{background:'transparent',color:COLORS.mu,fontSize:18}}>✕</button>
        </div>

        {!editing?(
          <div>
            <div style={{fontSize:16,fontWeight:'bold',marginBottom:10}}>{reminder.title}</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:10}}>
              <CatBadge label={reminder.category} cats={cats}/>
              <span className="badge" style={{background:COLORS.bo,color:COLORS.mu}}>{reminder.recurrence}</span>
            </div>
            <div style={{fontSize:13,color:COLORS.mu,marginBottom:8}}>📅 {fmtDateTime(reminder.datetime)}</div>
            {reminder.notes?(
              <div style={{fontSize:13,background:COLORS.bo,borderRadius:6,padding:'8px 10px',marginBottom:10,whiteSpace:'pre-wrap'}}>{reminder.notes}</div>
            ):null}
            {(reminder.images||[]).length>0&&(
              <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10}}>
                {(reminder.images||[]).map(function(img){return(
                  <div key={img.id} style={{position:'relative'}}>
                    <img src={img.base64} style={{width:70,height:70,objectFit:'cover',borderRadius:6,border:'1px solid '+COLORS.bo}}/>
                    <button onClick={function(){removeImg(img.id);}} style={{position:'absolute',top:-4,right:-4,background:COLORS.rd,color:'#fff',width:18,height:18,borderRadius:'50%',fontSize:10,padding:0}}>✕</button>
                  </div>
                );})}
              </div>
            )}
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <button onClick={function(){fileRef.current.click();}} style={{background:COLORS.bo,color:COLORS.tx,padding:'6px 12px',fontSize:12}}>📷 Add Image</button>
              <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={handleImg}/>
            </div>

            {/* Defer picker */}
            {showDefer&&(
              <div style={{background:COLORS.bo,borderRadius:8,padding:'10px',marginBottom:10}}>
                <div className="section-label">DEFER BY</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {DEFER_OPTS.map(function(o){return(
                    <button key={o.label} onClick={function(){onDefer(reminder,o.ms);setShowDefer(false);onClose();}} style={{background:COLORS.ca,color:COLORS.tx,padding:'6px 12px',borderRadius:6,fontSize:12}}>{o.label}</button>
                  );})}

              </div>
            )}

            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <button onClick={function(){onDismiss(reminder);onClose();}} style={{background:COLORS.gr+'22',color:COLORS.gr,border:'1px solid '+COLORS.gr+'44',padding:'7px 14px',fontSize:12}}>✓ Dismiss</button>
              <button onClick={function(){setShowDefer(function(v){return!v;});}} style={{background:COLORS.yl+'22',color:COLORS.yl,border:'1px solid '+COLORS.yl+'44',padding:'7px 14px',fontSize:12}}>⏩ Defer</button>
              <button onClick={function(){setEditing(true);}} style={{background:COLORS.bl+'22',color:COLORS.bl,border:'1px solid '+COLORS.bl+'44',padding:'7px 14px',fontSize:12}}>✏ Edit</button>

function ReminderCard({reminder,cats,onClick,isDesktop,isSelected}){
  var now=new Date();
  var dt=new Date(reminder.datetime);
  var overdue=dt<now&&!reminder.dismissed;
  var ms=dt-now;
  var cardStyle={marginBottom:8,borderLeft:'3px solid '+(overdue?COLORS.rd:COLORS.te),cursor:'pointer',opacity:reminder.dismissed?0.5:1,padding:isDesktop?'14px 16px':'12px 14px'};
  if(isSelected){cardStyle.border='1px solid '+COLORS.te;cardStyle.background=COLORS.te+'11';}
  return(
    <div className="card" onClick={onClick} style={cardStyle}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{flex:1,fontSize:14,fontWeight:'bold'}}>{reminder.title}</span>
        <CatBadge label={reminder.category} cats={cats}/>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10,marginTop:5}}>
        <span style={{fontSize:11,color:overdue?COLORS.rd:COLORS.mu}}>📅 {fmtDateTime(reminder.datetime)}</span>
        {!reminder.dismissed&&<span style={{fontSize:11,color:overdue?COLORS.rd:COLORS.te,fontWeight:'bold',marginLeft:'auto'}}>{overdue?'OVERDUE':fmtCountdown(ms)}</span>}
        {reminder.recurrence!=='none'&&<span className="badge" style={{background:COLORS.bo,color:COLORS.mu,fontSize:10}}>{reminder.recurrence}</span>}
      </div>
      {(isDesktop&&reminder.notes)?<div style={{fontSize:12,color:COLORS.mu,marginTop:6,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{reminder.notes}</div>:null}
    </div>
  );
}

function RemindersModule({reminders,setReminders,cats,selectedDate,isDesktop,selectedItem,setSelectedItem,panelOpen,payments,setPayments}){
  var[subTab,setSubTab]=useState('personal');
  var[selected,setSelected]=useState(null);
  var now=new Date();
  if(subTab==='payments') return <PaymentRemindersTab payments={payments} setPayments={setPayments} isDesktop={isDesktop} onSwitchTab={function(t){setSubTab(t);}}/>;
  var isToday=selectedDate===TODAY;
  var dateReminders=reminders.filter(function(r){return r.datetime.split('T')[0]===selectedDate;});
  var active=dateReminders.filter(function(r){return!r.dismissed;});
  var overdue=isToday?reminders.filter(function(r){return!r.dismissed&&new Date(r.datetime)<now&&r.datetime.split('T')[0]!==selectedDate;}):[];
  var upcoming=active.filter(function(r){return new Date(r.datetime)>=now||!isToday;}).sort(function(a,b){return new Date(a.datetime)-new Date(b.datetime);});
  var pastItems=!isToday?active.filter(function(r){return new Date(r.datetime)<now;}).sort(function(a,b){return new Date(a.datetime)-new Date(b.datetime);}):[];
  var dismissed=dateReminders.filter(function(r){return r.dismissed;});
  var gridStyle=(isDesktop&&!panelOpen)?{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}:{};
  function isReminderSelected(id){return !!(selectedItem&&selectedItem.type==='reminder'&&selectedItem.id===id);}
  function handleCardClick(r){
    if(isDesktop){setSelectedItem({type:'reminder',id:r.id});}
    else{setSelected(r.id);}
  }

  function handleSave(updated){setReminders(reminders.map(function(r){return r.id===updated.id?{...updated,updatedAt:Date.now()}:r;}));}
  function handleDelete(id){setReminders(reminders.filter(function(r){return r.id!==id;}));}
  function handleDismiss(reminder){
    if(reminder.recurrence!=='none'){
      var newDT=nextOccurrence(reminder.datetime,reminder.recurrence);
      setReminders(reminders.map(function(r){return r.id===reminder.id?{...r,datetime:newDT,dismissed:false,updatedAt:Date.now()}:r;}));
    } else {
      setReminders(reminders.map(function(r){return r.id===reminder.id?{...r,dismissed:true,updatedAt:Date.now()}:r;}));
    }
  }
  function handleDefer(reminder,ms){
    var newDT=new Date(new Date(reminder.datetime).getTime()+ms).toISOString().slice(0,16);
    setReminders(reminders.map(function(r){return r.id===reminder.id?{...r,datetime:newDT,dismissed:false,updatedAt:Date.now()}:r;}));
  }

  var selectedReminder=selected?reminders.find(function(r){return r.id===selected;}):null;

  return(
    <div style={{padding:isDesktop?'20px 24px':'12px 14px',paddingBottom:isDesktop?24:80}}>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button onClick={function(){setSubTab('personal');}} className={'pill'+(subTab==='personal'?' active':'')}>🔔 Personal</button>
        <button onClick={function(){setSubTab('payments');}} className={'pill'+(subTab==='payments'?' active':'')}>💳 Payments</button>
      </div>
      {overdue.length>0&&(
        <div style={{marginBottom:16}}>
          <div className="section-label" style={{color:COLORS.rd}}>⚠ OVERDUE ({overdue.length})</div>
          <div style={gridStyle}>{overdue.map(function(r){return <ReminderCard key={r.id} reminder={r} cats={cats} isDesktop={isDesktop} isSelected={isReminderSelected(r.id)} onClick={function(){handleCardClick(r);}}/>;})}</div>
        </div>
      )}
      {pastItems.length>0&&(
        <div style={{marginBottom:16}}>
          <div className="section-label" style={{color:COLORS.mu}}>EARLIER THIS DAY ({pastItems.length})</div>
          <div style={gridStyle}>{pastItems.map(function(r){return <ReminderCard key={r.id} reminder={r} cats={cats} isDesktop={isDesktop} isSelected={isReminderSelected(r.id)} onClick={function(){handleCardClick(r);}}/>;})}</div>
        </div>
      )}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div className="section-label" style={{marginBottom:0}}>{isToday?'UPCOMING':'SCHEDULED'} ({upcoming.length})</div>
      </div>
      {upcoming.length===0&&overdue.length===0&&pastItems.length===0&&dismissed.length===0&&(
        <div className="card" style={{textAlign:'center',color:COLORS.mu,padding:20}}>No reminders for this date.</div>
      )}
      <div style={gridStyle}>{upcoming.map(function(r){return <ReminderCard key={r.id} reminder={r} cats={cats} isDesktop={isDesktop} isSelected={isReminderSelected(r.id)} onClick={function(){handleCardClick(r);}}/>;})}</div>
      {dismissed.length>0&&(
        <div style={{marginTop:16}}>
          <div className="section-label" style={{color:COLORS.mu}}>✓ DISMISSED ({dismissed.length})</div>
          <div style={gridStyle}>{dismissed.map(function(r){return <ReminderCard key={r.id} reminder={r} cats={cats} isDesktop={isDesktop} isSelected={isReminderSelected(r.id)} onClick={function(){handleCardClick(r);}}/>;})}</div>
        </div>
      )}
      {!isDesktop&&selectedReminder&&(
        <ReminderDetailModal
          reminder={selectedReminder}
          cats={cats}
          onClose={function(){setSelected(null);}}
          onSave={function(u){handleSave(u);}}
          onDelete={function(id){handleDelete(id);setSelected(null);}}
          onDismiss={function(r){handleDismiss(r);}}
          onDefer={function(r,ms){handleDefer(r,ms);}}
        />
      )}
    </div>
  );
}

function GoalDetailModal({goal,cats,onClose,onSave,onDelete,onComplete,tasks,onTaskAdd,onTaskUpdate,onTaskDelete,onTaskSwap}){
  var[editMode,setEditMode]=useState(false);
  var[title,setTitle]=useState(goal.title);
  var[category,setCategory]=useState(goal.category);
  var[targetDate,setTargetDate]=useState(goal.targetDate||'');
  var[notes,setNotes]=useState(goal.notes||'');
  var[localMiles,setLocalMiles]=useState([]);
  var[editMileId,setEditMileId]=useState(null);
  var[editMileText,setEditMileText]=useState('');
  var[editMileDate,setEditMileDate]=useState('');
  var[addingMile,setAddingMile]=useState(false);
  var[newMileText,setNewMileText]=useState('');
  var[expandedMiles,setExpandedMiles]=useState({});
  var[expandedCompTasks,setExpandedCompTasks]=useState({});
  var newMileRef=useRef();
  var fileRef=useRef();

  var daysLeft=goal.targetDate?Math.ceil((new Date(goal.targetDate+'T00:00:00')-new Date())/(1000*60*60*24)):null;

  function enterEdit(){setLocalMiles((goal.milestones||[]).map(function(m){return{...m};}));setEditMileId(null);setAddingMile(false);setEditMode(true);}
  function cancelEdit(){setTitle(goal.title);setCategory(goal.category);setTargetDate(goal.targetDate||'');setNotes(goal.notes||'');setLocalMiles((goal.milestones||[]).map(function(m){return{...m};}));setEditMode(false);setEditMileId(null);setAddingMile(false);}
  function saveAll(){onSave({...goal,title:title,category:category,targetDate:targetDate,notes:notes,milestones:localMiles});setEditMode(false);}

  function toggleMilestone(id){var updated=goal.milestones.map(function(m){return m.id===id?{...m,done:!m.done}:m;});onSave({...goal,milestones:updated});}
  function editMoveMile(idx,dir){var ms=localMiles.slice();var ni=idx+dir;if(ni<0||ni>=ms.length)return;var tmp=ms[idx];ms[idx]=ms[ni];ms[ni]=tmp;setLocalMiles(ms);}
  function editDeleteMile(id){setLocalMiles(localMiles.filter(function(m){return m.id!==id;}));}
  function startEditMile(m){setEditMileId(m.id);setEditMileText(m.text);setEditMileDate(m.date||'');}
  function saveEditMile(){
    var updated=localMiles.map(function(m){return m.id!==editMileId?m:{...m,text:editMileText,date:editMileDate||null};});
    setLocalMiles(updated);
    var changedMile=updated.find(function(m){return m.id===editMileId;});
    if(changedMile&&changedMile.date){
      var already=tasks.find(function(t){return t.goalRef&&t.goalRef.milestoneId===changedMile.id&&t.goalRef.isMilestoneSelf;});
      if(!already){onTaskAdd({id:Date.now()+Math.random(),text:changedMile.text,priority:'Medium',category:'Personal',done:false,date:changedMile.date,notes:'',images:[],goalRef:{goalId:goal.id,goalTitle:goal.title,milestoneId:changedMile.id,milestoneText:changedMile.text,isMilestoneSelf:true},updatedAt:Date.now()});}
      else{onTaskUpdate({...already,text:changedMile.text,date:changedMile.date,updatedAt:Date.now()});}
    }
    setEditMileId(null);
  }
  function addMilestone(){if(!newMileText.trim())return;setLocalMiles([...localMiles,{id:Date.now()+Math.random(),text:newMileText.trim(),done:false,date:null}]);setNewMileText('');setAddingMile(false);}
  function handleReorderTask(task,milestoneId,dir){
    var mileTasks=tasks.filter(function(t){return t.goalRef&&t.goalRef.goalId===goal.id&&t.goalRef.milestoneId===milestoneId&&!t.goalRef.isMilestoneSelf;});
    var idx=mileTasks.findIndex(function(t){return t.id===task.id;});var newIdx=idx+(dir==='up'?-1:1);
    if(newIdx<0||newIdx>=mileTasks.length)return;
    onTaskSwap(mileTasks[idx].id,mileTasks[newIdx].id);
  }
  function handleMoveTask(task,targetMileId){var targetMile=localMiles.find(function(m){return m.id===targetMileId;});if(!targetMile)return;onTaskUpdate({...task,goalRef:{...task.goalRef,milestoneId:targetMile.id,milestoneText:targetMile.text},updatedAt:Date.now()});}
  function handleImg(e){var files=Array.from(e.target.files);if(!files.length)return;var newImgs=[];var loaded=0;files.forEach(function(f){var r=new FileReader();r.onload=function(ev){compressImage(ev.target.result,800,0.6).then(function(compressed){newImgs.push({id:Date.now()+Math.random(),base64:compressed});loaded++;if(loaded===files.length){onSave({...goal,images:[...(goal.images||[]),...newImgs]});}});};r.readAsDataURL(f);});}
  function removeImg(imgId){onSave({...goal,images:(goal.images||[]).filter(function(i){return i.id!==imgId;})});}

  var done=(goal.milestones||[]).filter(function(m){return m.done;}).length;
  var total=(goal.milestones||[]).length;
  var pct=total>0?Math.round((done/total)*100):0;
  var catColor=GOAL_CAT_COLOR[goal.category]||COLORS.mu;

  return(
    <div className="modal-overlay" onClick={onClose}>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <span style={{fontSize:15,fontWeight:'bold',color:COLORS.te}}>🎯 Goal</span>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {!editMode&&!goal.completed&&<button onClick={enterEdit} style={{background:COLORS.bl+'22',color:COLORS.bl,border:'1px solid '+COLORS.bl+'44',padding:'4px 10px',fontSize:12}}>✏ Edit</button>}
            <button onClick={onClose} style={{background:'transparent',color:COLORS.mu,fontSize:18}}>✕</button>
          </div>
        </div>
        {editMode?(
          <div>
            <div className="section-label">Title</div>
            <input value={title} onChange={function(e){setTitle(e.target.value);}} style={{marginBottom:10}}/>
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <div style={{flex:1}}><div className="section-label">Category</div>
                <select value={category} onChange={function(e){setCategory(e.target.value);}}>
                  {cats.map(function(c){return <option key={c.id}>{c.label}</option>;})}
                </select>
              </div>
              <div style={{flex:1}}><div className="section-label">Target Date</div>
                <input type="date" value={targetDate} onChange={function(e){setTargetDate(e.target.value);}}/>
              </div>
            </div>
            <div className="section-label">Notes</div>
            <textarea rows={2} value={notes} onChange={function(e){setNotes(e.target.value);}} style={{marginBottom:12,resize:'vertical'}}/>
            <div className="section-label">MILESTONES</div>
            {localMiles.map(function(m,idx){return(
              <div key={m.id} style={{marginBottom:6,border:'1px solid '+COLORS.bo,borderRadius:8,padding:'8px 10px'}}>
                {editMileId===m.id?(
                  <div>
                    <input value={editMileText} onChange={function(e){setEditMileText(e.target.value);}} style={{marginBottom:6,fontSize:13}}/>
                    <div style={{display:'flex',gap:6,marginBottom:6,alignItems:'center'}}>
                      <input type="date" value={editMileDate} onChange={function(e){setEditMileDate(e.target.value);}} style={{flex:1,fontSize:11}}/>
                      <span style={{fontSize:10,color:COLORS.mu,whiteSpace:'nowrap'}}>→ task list</span>
                    </div>
                    <div style={{display:'flex',gap:6}}>

                    <MilestoneTasksSection milestone={m} milestoneIdx={idx} allMilestones={localMiles} goalId={goal.id} goalTitle={goal.title} tasks={tasks} onTaskAdd={onTaskAdd} onTaskUpdate={onTaskUpdate} onTaskDelete={onTaskDelete} onMoveTask={handleMoveTask} onReorderTask={handleReorderTask}/>

function GoalCard({goal,onClick,isDesktop,isSelected}){
  var done=goal.milestones.filter(function(m){return m.done;}).length;
  var total=goal.milestones.length;
  var pct=total>0?Math.round((done/total)*100):0;
  var catColor=GOAL_CAT_COLOR[goal.category]||COLORS.mu;
  var daysLeft=goal.targetDate?Math.ceil((new Date(goal.targetDate+'T00:00:00')-new Date())/(1000*60*60*24)):null;
  var previewMilestones=isDesktop?goal.milestones.slice(0,2):[];
  var cardStyle={marginBottom:8,borderLeft:'3px solid '+catColor,cursor:'pointer',opacity:goal.completed?0.6:1,padding:isDesktop?'14px 16px':'12px 14px'};
  if(isSelected){cardStyle.border='1px solid '+COLORS.te;cardStyle.background=COLORS.te+'11';}
  return(
    <div className="card" onClick={onClick} style={cardStyle}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
        <span style={{flex:1,fontSize:14,fontWeight:'bold',textDecoration:goal.completed?'line-through':'none',color:goal.completed?COLORS.mu:COLORS.tx}}>{goal.title}</span>
        <span className="badge" style={{background:catColor+'22',color:catColor,border:'1px solid '+catColor+'44',fontSize:10}}>{goal.category}</span>
      </div>
      {total>0&&(
        <div style={{marginBottom:6}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:COLORS.mu,marginBottom:3}}>
            <span>{done}/{total} milestones</span>
            <span style={{color:pct===100?COLORS.gr:COLORS.te}}>{pct}%</span>
          </div>
          <div style={{height:5,background:COLORS.bo,borderRadius:3,overflow:'hidden'}}>
            <div style={{height:'100%',width:pct+'%',background:pct===100?COLORS.gr:COLORS.te,borderRadius:3}}/>
          </div>
        </div>
      )}
      {(isDesktop&&previewMilestones.length>0)?(
        <div style={{marginBottom:6}}>
          {previewMilestones.map(function(m){return(
            <div key={m.id} style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
              <div style={{width:12,height:12,borderRadius:3,border:'1px solid '+(m.done?COLORS.gr:COLORS.bo),background:m.done?COLORS.gr:'transparent',flexShrink:0}}/>
              <span style={{fontSize:11,color:m.done?COLORS.mu:COLORS.tx,textDecoration:m.done?'line-through':'none',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}}>{m.text}</span>
            </div>
          );})}
          {total>2&&<span style={{fontSize:10,color:COLORS.mu}}>+{total-2} more</span>}
        </div>
      ):null}
      {goal.targetDate&&(
        <div style={{fontSize:11,color:(daysLeft!==null&&daysLeft<7&&!goal.completed)?COLORS.yl:COLORS.mu}}>
          {fmtDate(goal.targetDate)}{daysLeft!==null&&!goal.completed?' - '+(daysLeft<0?'Overdue':daysLeft===0?'Due today':daysLeft+'d left'):''}
        </div>
      )}
    </div>
  );
}

function GoalsModule({goals,setGoals,cats,isDesktop,selectedItem,setSelectedItem,panelOpen,tasks,onTaskAdd,onTaskUpdate,onTaskDelete,onTaskSwap}){
  var[selected,setSelected]=useState(null);
  var[hideCompleted,setHideCompleted]=useState(false);
  var active=goals.filter(function(g){return!g.completed;});
  var completed=goals.filter(function(g){return g.completed;});
  var gridStyle=(isDesktop&&!panelOpen)?{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}:{};
  function isGoalSelected(id){return !!(selectedItem&&selectedItem.type==='goal'&&selectedItem.id===id);}
  function handleCardClick(g){
    if(isDesktop){setSelectedItem({type:'goal',id:g.id});}
    else{setSelected(g.id);}
  }

  function handleSave(updated){setGoals(goals.map(function(g){return g.id===updated.id?{...updated,updatedAt:Date.now()}:g;}));}
  function handleDelete(id){setGoals(goals.filter(function(g){return g.id!==id;}));}
  function handleComplete(goal){setGoals(goals.map(function(g){return g.id===goal.id?{...g,completed:true,completedDate:new Date().toISOString(),updatedAt:Date.now()}:g;}));}

  var selectedGoal=selected?goals.find(function(g){return g.id===selected;}):null;

  return(
    <div style={{padding:isDesktop?'20px 24px':'12px 14px',paddingBottom:isDesktop?24:80}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div className="section-label" style={{marginBottom:0}}>ACTIVE GOALS ({active.length})</div>
      </div>
      {active.length===0&&<div className="card" style={{textAlign:'center',color:COLORS.mu,padding:20}}>No active goals. Tap + to add one.</div>}
      <div style={gridStyle}>{active.map(function(g){return <GoalCard key={g.id} goal={g} isDesktop={isDesktop} isSelected={isGoalSelected(g.id)} onClick={function(){handleCardClick(g);}}/>;})}</div>
      {completed.length>0&&(
        <div style={{marginTop:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div className="section-label" style={{marginBottom:0,color:COLORS.mu}}>COMPLETED ({completed.length})</div>
            <button onClick={function(){setHideCompleted(function(v){return!v;});}} style={{background:'transparent',color:COLORS.mu,fontSize:11,padding:'2px 6px'}}>{hideCompleted?'Show':'Hide'}</button>
          </div>
          {!hideCompleted&&<div style={gridStyle}>{completed.map(function(g){return <GoalCard key={g.id} goal={g} isDesktop={isDesktop} isSelected={isGoalSelected(g.id)} onClick={function(){handleCardClick(g);}}/>;})}</div>}
        </div>
      )}
      {!isDesktop&&selectedGoal&&(
        <GoalDetailModal goal={selectedGoal} cats={cats} onClose={function(){setSelected(null);}} onSave={function(u){handleSave(u);}} onDelete={function(id){handleDelete(id);setSelected(null);}} onComplete={function(g){handleComplete(g);}} tasks={tasks} onTaskAdd={onTaskAdd} onTaskUpdate={onTaskUpdate} onTaskDelete={onTaskDelete} onTaskSwap={onTaskSwap}/>
      )}
    </div>
  );
}
