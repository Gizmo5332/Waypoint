<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0d1117"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>🧭 WAYPOINT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0d1117;color:#eef1fa;font-family:'Courier New',Courier,monospace;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#0d1117;}
::-webkit-scrollbar-thumb{background:#2e3347;border-radius:2px;}
input,textarea,select{font-family:'Courier New',Courier,monospace;color:#eef1fa;background:#1a1f2e;border:1px solid #2e3347;border-radius:6px;padding:8px 10px;font-size:14px;outline:none;width:100%;}
input:focus,textarea:focus,select:focus{border-color:#14b8a6;}
button{font-family:'Courier New',Courier,monospace;cursor:pointer;border:none;border-radius:6px;font-size:13px;transition:opacity .15s,transform .1s;}
button:active{transform:scale(.96);}
.flash{animation:flash .25s ease;}
@keyframes flash{0%{opacity:1;}50%{opacity:.5;}100%{opacity:1;}}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:bold;letter-spacing:.5px;}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #2e3347;background:transparent;color:#8b90a8;transition:all .15s;}
.pill.active{background:#14b8a6;color:#0d1117;border-color:#14b8a6;font-weight:bold;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#161b27;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px;}
.modal-box.center{border-radius:16px;align-self:center;margin:16px;}
.modal-handle{width:40px;height:4px;background:#2e3347;border-radius:2px;margin:0 auto 16px;}
.section-label{font-size:11px;letter-spacing:1.5px;color:#8b90a8;text-transform:uppercase;margin-bottom:8px;}
.card{background:#161b27;border:1px solid #2e3347;border-radius:10px;padding:12px 14px;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ─── CONSTANTS ───────────────────────────────────────────────────
const COLORS={bg:'#0d1117',su:'#161b27',ca:'#1a1f2e',bo:'#2e3347',te:'#14b8a6',gr:'#22c55e',rd:'#ef4444',yl:'#eab308',bl:'#3b82f6',pu:'#a855f7',tx:'#eef1fa',mu:'#8b90a8'};
const TODAY=new Date().toISOString().split('T')[0];
const PRIORITY_COLOR={High:COLORS.rd,Medium:COLORS.yl,Low:COLORS.gr};
const GOAL_CAT_COLOR={'Health':COLORS.gr,'Financial':COLORS.yl,'Personal Growth':COLORS.te,'Family':COLORS.bl,'Career':COLORS.pu};

const DEFAULT_CATEGORIES=[
  {id:1,label:'Personal',color:COLORS.te},
  {id:2,label:'Family',color:COLORS.bl},
  {id:3,label:'Health',color:COLORS.gr},
  {id:4,label:'Financial',color:COLORS.yl},
  {id:5,label:'Kids',color:COLORS.pu},
];

const SAMPLE_TASKS=[
  {id:1,text:'Schedule oil change for the truck',priority:'High',category:'Personal',done:false,date:TODAY,notes:'',images:[]},
  {id:2,text:'Review kids school schedule for next week',priority:'High',category:'Family',done:false,date:TODAY,notes:'',images:[]},
  {id:3,text:'Call insurance about policy renewal',priority:'Medium',category:'Financial',done:false,date:TODAY,notes:'',images:[]},
  {id:4,text:'Pick up prescription from pharmacy',priority:'Medium',category:'Health',done:true,date:TODAY,notes:'',images:[]},
  {id:5,text:"Order birthday gift for mom",priority:'Low',category:'Family',done:false,date:TODAY,notes:'',images:[]},
];

const SAMPLE_REMINDERS=[
  {id:1,title:"Emma's soccer practice",datetime:'2026-03-31T16:00',recurrence:'weekly',category:'Kids',notes:'',images:[],dismissed:false},
  {id:2,title:'Pay electric bill',datetime:'2026-03-31T18:00',recurrence:'monthly',category:'Financial',notes:'',images:[],dismissed:false},
  {id:3,title:'Anniversary dinner reservation',datetime:'2026-04-03T19:00',recurrence:'none',category:'Family',notes:'',images:[],dismissed:false},
  {id:4,title:'Morning vitamins',datetime:'2026-03-31T08:00',recurrence:'daily',category:'Health',notes:'',images:[],dismissed:false},
  {id:5,title:'Call Dad',datetime:'2026-04-02T12:00',recurrence:'weekly',category:'Personal',notes:'',images:[],dismissed:false},
];

const SAMPLE_GOALS=[
  {id:1,title:'Run a 5K',category:'Health',targetDate:'2026-06-01',milestones:[{id:1,text:'Run 1 mile without stopping',done:true},{id:2,text:'Run 2 miles consistently',done:true},{id:3,text:'Register for a local 5K',done:false},{id:4,text:'Complete first 5K race',done:false}],notes:'',images:[],completed:false,completedDate:null},
  {id:2,title:'Build emergency fund ($5,000)',category:'Financial',targetDate:'2026-12-31',milestones:[{id:1,text:'Save first $1,000',done:true},{id:2,text:'Reach $2,500 halfway point',done:false},{id:3,text:'Hit $5,000 goal',done:false}],notes:'',images:[],completed:false,completedDate:null},
  {id:3,title:'Read 12 books this year',category:'Personal Growth',targetDate:'2026-12-31',milestones:[{id:1,text:'Finish first book',done:true},{id:2,text:'Complete 3 books Q1',done:true},{id:3,text:'Complete 6 books midyear',done:false},{id:4,text:'Complete 9 books Q3',done:false},{id:5,text:'Finish all 12 books',done:false}],notes:'',images:[],completed:false,completedDate:null},
];

const DEFAULT_SETTINGS={name:'Jesse',notificationsEnabled:true,geminiApiKey:'',groqApiKey:'',gistToken:'',gistId:'',aiEngine:'gemini',aiEngineForcedGroqUntil:null,closePhrase:'hey waypoint close'};

// ─── STORAGE ─────────────────────────────────────────────────────
function load(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch{return fallback;}}
// Write guard: never let a smaller array overwrite a larger saved one
function saveGuarded(key,val){
  try{
    const existing=JSON.parse(localStorage.getItem(key)||'[]');
    if(Array.isArray(existing)&&Array.isArray(val)&&existing.length>val.length){
      console.warn('[WAYPOINT] save blocked — would reduce',key);return;
    }
    localStorage.setItem(key,JSON.stringify(val));
  }catch{}
}
function saveAny(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}

// ─── CARRY-FORWARD ───────────────────────────────────────────────
function applyCarryForward(tasks){
  const pastIncomplete=tasks.filter(t=>t.date<TODAY&&!t.done);
  if(!pastIncomplete.length)return tasks;
  const todayIds=new Set(tasks.filter(t=>t.date===TODAY).map(t=>t.id));
  const toCarry=pastIncomplete.filter(t=>!todayIds.has(t.id)).map(t=>({...t,date:TODAY,carried:true}));
  // Remove old copies, add carried versions for today
  const cleaned=tasks.filter(t=>!toCarry.find(c=>c.id===t.id));
  return [...cleaned,...toCarry];
}

// ─── HOOKS ───────────────────────────────────────────────────────
function useWindowWidth(){const[w,setW]=useState(window.innerWidth);useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);return w;}

// ─── UTILS ───────────────────────────────────────────────────────
function fmtDate(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtDateTime(dt){if(!dt)return'';const d=new Date(dt);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
function getDayGreeting(){const h=new Date().getHours();if(h<12)return'Good morning';if(h<17)return'Good afternoon';return'Good evening';}
function getDayStr(){return new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});}
function msUntil(dtStr){return new Date(dtStr)-new Date();}
function fmtCountdown(ms){if(ms<=0)return'NOW';const m=Math.floor(ms/60000);const h=Math.floor(m/60);const d=Math.floor(h/24);if(d>0)return`${d}d ${h%24}h`;if(h>0)return`${h}h ${m%60}m`;return`${m}m`;}
function getCatColor(cats,label){const c=cats.find(x=>x.label===label);return c?c.color:COLORS.mu;}

// ─── COMPONENTS ──────────────────────────────────────────────────

function CatBadge({label,cats}){
  const color=getCatColor(cats,label);
  return <span className="badge" style={{background:color+'22',color,border:`1px solid ${color}44`}}>{label}</span>;
}

function PriBadge({priority}){
  const c=PRIORITY_COLOR[priority]||COLORS.mu;
  return <span className="badge" style={{background:c+'22',color:c,border:`1px solid ${c}44`}}>{priority}</span>;
}

// ─── COUNTDOWN CARD ──────────────────────────────────────────────
function CountdownCard({label,value,sub,color}){
  return(
    <div className="card" style={{minWidth:130,flexShrink:0,borderColor:color+'44'}}>
      <div style={{fontSize:11,color:COLORS.mu,letterSpacing:1,textTransform:'uppercase',marginBottom:4}}>{label}</div>
      <div style={{fontSize:20,fontWeight:'bold',color}}>{value}</div>
      {sub&&<div style={{fontSize:11,color:COLORS.mu,marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{sub}</div>}
    </div>
  );
}

// ─── TASK ITEM ───────────────────────────────────────────────────
function TaskItem({task,cats,onToggle,onUpdate,onDelete}){
  const[open,setOpen]=useState(false);
  const[notes,setNotes]=useState(task.notes||'');
  const fileRef=useRef();

  function saveNotes(){onUpdate({...task,notes});}

  function handleImg(e){
    const files=Array.from(e.target.files);
    files.forEach(f=>{
      const r=new FileReader();
      r.onload=ev=>{
        const img={id:Date.now()+Math.random(),base64:ev.target.result,label:'',ocrText:null};
        onUpdate({...task,images:[...(task.images||[]),img]});
      };
      r.readAsDataURL(f);
    });
  }

  function removeImg(imgId){onUpdate({...task,images:(task.images||[]).filter(i=>i.id!==imgId)});}

  const pc=PRIORITY_COLOR[task.priority]||COLORS.mu;

  return(
    <div className="card" style={{marginBottom:8,borderLeft:`3px solid ${pc}`,opacity:task.done?0.7:1}}>
      <div style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}} onClick={()=>setOpen(o=>!o)}>
        <div onClick={e=>{e.stopPropagation();onToggle(task.id);}} style={{width:20,height:20,borderRadius:4,border:`2px solid ${task.done?COLORS.gr:COLORS.bo}`,background:task.done?COLORS.gr:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer'}}>
          {task.done&&<span style={{color:'#111',fontSize:12,fontWeight:'bold'}}>✓</span>}
        </div>
        <span className="dot" style={{background:pc}}/>
        <span style={{flex:1,fontSize:14,textDecoration:task.done?'line-through':'none',color:task.done?COLORS.mu:COLORS.tx}}>{task.text}</span>
        <CatBadge label={task.category} cats={cats}/>
        <span style={{color:COLORS.mu,fontSize:12}}>{open?'▲':'▼'}</span>
      </div>
      {open&&(
        <div style={{marginTop:12,borderTop:`1px solid ${COLORS.bo}`,paddingTop:12}}>
          <div className="section-label">Notes</div>
          <textarea rows={3} value={notes} onChange={e=>setNotes(e.target.value)} onBlur={saveNotes} style={{marginBottom:10,resize:'vertical'}} placeholder="Add notes..."/>
          <div style={{display:'flex',gap:8,marginBottom:10}}>
            <button onClick={()=>fileRef.current.click()} style={{background:COLORS.bo,color:COLORS.tx,padding:'6px 12px'}}>📷 Camera</button>
            <button onClick={()=>{fileRef.current.accept='image/*';fileRef.current.click();}} style={{background:COLORS.bo,color:COLORS.tx,padding:'6px 12px'}}>🖼 Gallery</button>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" multiple style={{display:'none'}} onChange={handleImg}/>
          </div>
          {(task.images||[]).length>0&&(
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:10}}>
              {task.images.map(img=>(
                <div key={img.id} style={{position:'relative'}}>
                  <img src={img.base64} style={{width:70,height:70,objectFit:'cover',borderRadius:6,border:`1px solid ${COLORS.bo}`}}/>
                  <button onClick={()=>removeImg(img.id)} style={{position:'absolute',top:-4,right:-4,background:COLORS.rd,color:'#fff',width:18,height:18,borderRadius:'50%',fontSize:10,padding:0}}>✕</button>
                </div>
              ))}
            </div>
          )}
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>onDelete(task.id)} style={{background:COLORS.rd+'22',color:COLORS.rd,border:`1px solid ${COLORS.rd}44`,padding:'5px 12px'}}>Delete</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── DASHBOARD ───────────────────────────────────────────────────
function Dashboard({tasks,reminders,goals,cats,onTaskToggle,onTaskUpdate,onTaskDelete,isDesktop}){
  const todayTasks=tasks.filter(t=>t.date===TODAY);
  const doneTasks=todayTasks.filter(t=>t.done);
  const activeTasks=todayTasks.filter(t=>!t.done).sort((a,b)=>{
    const order={High:0,Medium:1,Low:2};
    return(order[a.priority]!==undefined?order[a.priority]:3)-(order[b.priority]!==undefined?order[b.priority]:3);
  });
  const[doneOpen,setDoneOpen]=useState(false);

  // Countdown data
  const now=new Date();
  const nextReminder=reminders.filter(r=>!r.dismissed&&new Date(r.datetime)>now).sort((a,b)=>new Date(a.datetime)-new Date(b.datetime))[0];
  const upcomingEvents=reminders.filter(r=>!r.dismissed&&new Date(r.datetime)>now).sort((a,b)=>new Date(a.datetime)-new Date(b.datetime)).slice(0,3);

  // Coming Up — next 3 upcoming (include today)
  const comingUp=reminders.filter(r=>!r.dismissed).sort((a,b)=>new Date(a.datetime)-new Date(b.datetime)).slice(0,3);

  return(
    <div style={{padding:isDesktop?'20px 24px':'12px 14px',paddingBottom:isDesktop?24:80}}>
      {/* Greeting — mobile only (desktop shows in header bar) */}
      {!isDesktop&&(
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,color:COLORS.mu}}>{getDayStr()}</div>
          <div style={{fontSize:18,fontWeight:'bold',color:COLORS.te}}>{getDayGreeting()}, Jesse</div>
        </div>
      )}
      {isDesktop&&(
        <div style={{marginBottom:18}}>
          <div style={{fontSize:22,fontWeight:'bold',color:COLORS.te}}>{getDayGreeting()}, Jesse</div>
        </div>
      )}

      {/* 2x2 At a Glance grid — 4 col on desktop */}
      <div className="section-label">AT A GLANCE</div>
      <div style={{display:'grid',gridTemplateColumns:isDesktop?'repeat(4,1fr)':'1fr 1fr',gap:10,marginBottom:isDesktop?24:16}}>
        <CountdownCard label="Next Reminder" value={nextReminder?fmtCountdown(msUntil(nextReminder.datetime)):'—'} sub={nextReminder?nextReminder.title:null} color={COLORS.te}/>
        <CountdownCard label="Tasks Today" value={`${doneTasks.length}/${todayTasks.length}`} sub="completed" color={COLORS.bl}/>
        <CountdownCard label="Active Goals" value={goals.filter(g=>!g.completed).length} sub="in progress" color={COLORS.pu}/>
        <CountdownCard label="Reminders" value={reminders.filter(r=>!r.dismissed).length} sub="upcoming" color={COLORS.yl}/>
      </div>

      {/* Desktop 2-col: tasks left, coming up right */}
      {isDesktop?(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24,alignItems:'start'}}>
          {/* Left — Tasks */}
          <div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div className="section-label" style={{marginBottom:0}}>TODAY'S TASKS</div>
              <span style={{fontSize:11,color:COLORS.mu}}>{activeTasks.length} active</span>
            </div>
            {activeTasks.length===0&&doneTasks.length===0&&(
              <div className="card" style={{textAlign:'center',color:COLORS.mu,padding:20}}>No tasks today. Tap + to add one.</div>
            )}
            {activeTasks.map(t=>(
              <TaskItem key={t.id} task={t} cats={cats} onToggle={onTaskToggle} onUpdate={onTaskUpdate} onDelete={onTaskDelete}/>
            ))}
            {doneTasks.length>0&&(
              <div style={{marginBottom:8}}>
                <button onClick={()=>setDoneOpen(o=>!o)} style={{background:'transparent',color:COLORS.mu,padding:'4px 0',fontSize:12}}>
                  {doneOpen?'▼':'▶'} COMPLETED ({doneTasks.length})
                </button>
                {doneOpen&&doneTasks.map(t=>(
                  <TaskItem key={t.id} task={t} cats={cats} onToggle={onTaskToggle} onUpdate={onTaskUpdate} onDelete={onTaskDelete}/>
                ))}
              </div>
            )}
          </div>
          {/* Right — Coming Up + Upcoming Reminders */}
          <div>
            {comingUp.length>0&&(
              <div style={{marginBottom:20}}>
                <div className="section-label">COMING UP</div>
                {comingUp.map(r=>(
                  <div key={r.id} className="card" style={{marginBottom:8,display:'flex',alignItems:'center',gap:10}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:'bold'}}>{r.title}</div>
                      <div style={{fontSize:11,color:COLORS.mu,marginTop:2}}>{fmtDateTime(r.datetime)}</div>
                    </div>
                    <CatBadge label={r.category} cats={cats}/>
                  </div>
                ))}
              </div>
            )}
            {upcomingEvents.length>0&&(
              <div>
                <div className="section-label">UPCOMING REMINDERS</div>
                {upcomingEvents.map(r=>(
                  <div key={r.id} className="card" style={{marginBottom:8,display:'flex',alignItems:'center',gap:10}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14}}>{r.title}</div>
                      <div style={{fontSize:11,color:COLORS.te,marginTop:2,fontWeight:'bold'}}>{fmtCountdown(msUntil(r.datetime))}</div>
                    </div>
                    <CatBadge label={r.category} cats={cats}/>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      ):(
        /* Mobile layout — original single column */
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div className="section-label" style={{marginBottom:0}}>TODAY'S TASKS</div>
            <span style={{fontSize:11,color:COLORS.mu}}>{activeTasks.length} active</span>
          </div>
          {activeTasks.length===0&&doneTasks.length===0&&(
            <div className="card" style={{textAlign:'center',color:COLORS.mu,padding:20}}>No tasks today. Tap + to add one.</div>
          )}
          {activeTasks.map(t=>(
            <TaskItem key={t.id} task={t} cats={cats} onToggle={onTaskToggle} onUpdate={onTaskUpdate} onDelete={onTaskDelete}/>
          ))}
          {doneTasks.length>0&&(
            <div style={{marginBottom:8}}>
              <button onClick={()=>setDoneOpen(o=>!o)} style={{background:'transparent',color:COLORS.mu,padding:'4px 0',fontSize:12}}>
                {doneOpen?'▼':'▶'} COMPLETED ({doneTasks.length})
              </button>
              {doneOpen&&doneTasks.map(t=>(
                <TaskItem key={t.id} task={t} cats={cats} onToggle={onTaskToggle} onUpdate={onTaskUpdate} onDelete={onTaskDelete}/>
              ))}
            </div>
          )}
          {comingUp.length>0&&(
            <>
              <div className="section-label" style={{marginTop:16}}>COMING UP</div>
              {comingUp.map(r=>(
                <div key={r.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:`1px solid ${COLORS.bo}`}}>
                  <span style={{fontSize:12,color:COLORS.mu,whiteSpace:'nowrap'}}>{fmtDateTime(r.datetime)}</span>
                  <span style={{flex:1,fontSize:13}}>{r.title}</span>
                  <CatBadge label={r.category} cats={cats}/>
                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── REMINDERS MODULE ────────────────────────────────────────────
function nextOccurrence(datetime,recurrence){
  var d=new Date(datetime);
  if(recurrence==='daily'){d.setDate(d.getDate()+1);}
  else if(recurrence==='weekly'){d.setDate(d.getDate()+7);}
  else if(recurrence==='monthly'){d.setMonth(d.getMonth()+1);}
  return d.toISOString().slice(0,16);
}

function ReminderDetailModal({reminder,cats,onClose,onSave,onDelete,onDismiss,onDefer}){
  var[editing,setEditing]=useState(false);
  var[title,setTitle]=useState(reminder.title);
  var[datetime,setDatetime]=useState(reminder.datetime);
  var[recurrence,setRecurrence]=useState(reminder.recurrence);
  var[category,setCategory]=useState(reminder.category);
  var[notes,setNotes]=useState(reminder.notes||'');
  var[showDefer,setShowDefer]=useState(false);
  var fileRef=useRef();

  function handleImg(e){
    var files=Array.from(e.target.files);
    files.forEach(function(f){
      var r=new FileReader();
      r.onload=function(ev){
        var img={id:Date.now()+Math.random(),base64:ev.target.result};
        onSave({...reminder,images:[...(reminder.images||[]),img]});
      };
      r.readAsDataURL(f);
    });
  }
  function removeImg(imgId){onSave({...reminder,images:(reminder.images||[]).filter(function(i){return i.id!==imgId;})});}

  function handleSave(){
    onSave({...reminder,title,datetime,recurrence,category,notes});
    setEditing(false);
  }

  var DEFER_OPTS=[{label:'1 hour',ms:3600000},{label:'3 hours',ms:10800000},{label:'1 day',ms:86400000},{label:'1 week',ms:604800000}];

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box center" style={{maxHeight:'85vh',overflowY:'auto'}} onClick={function(e){e.stopPropagation();}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <span style={{fontSize:15,fontWeight:'bold',color:COLORS.te}}>🔔 Reminder</span>
          <button onClick={onClose} style={{background:'transparent',color:COLORS.mu,fontSize:18}}>✕</button>
        </div>

        {!editing?(
          <div>

  return(
    <div className="card" onClick={onClick} style={{marginBottom:8,borderLeft:'3px solid '+(overdue?COLORS.rd:COLORS.te),cursor:'pointer',opacity:reminder.dismissed?0.5:1}}>

        {!reminder.dismissed&&<span style={{fontSize:11,color:overdue?COLORS.rd:COLORS.te,fontWeight:'bold',marginLeft:'auto'}}>{overdue?'OVERDUE':fmtCountdown(ms)}</span>}
        {reminder.recurrence!=='none'&&<span className="badge" style={{background:COLORS.bo,color:COLORS.mu,fontSize:10}}>{reminder.recurrence}</span>}

function RemindersModule({reminders,setReminders,cats}){
  var[selected,setSelected]=useState(null);
  var now=new Date();
  var active=reminders.filter(function(r){return!r.dismissed;});
  var overdue=active.filter(function(r){return new Date(r.datetime)<now;}).sort(function(a,b){return new Date(a.datetime)-new Date(b.datetime);});
  var upcoming=active.filter(function(r){return new Date(r.datetime)>=now;}).sort(function(a,b){return new Date(a.datetime)-new Date(b.datetime);});
  var dismissed=reminders.filter(function(r){return r.dismissed;});

  function handleSave(updated){setReminders(reminders.map(function(r){return r.id===updated.id?{...updated,updatedAt:Date.now()}:r;}));}
  function handleDelete(id){setReminders(reminders.filter(function(r){return r.id!==id;}));}
  function handleDismiss(reminder){
    if(reminder.recurrence!=='none'){
      var newDT=nextOccurrence(reminder.datetime,reminder.recurrence);
      setReminders(reminders.map(function(r){return r.id===reminder.id?{...r,datetime:newDT,dismissed:false,updatedAt:Date.now()}:r;}));
    } else {
      setReminders(reminders.map(function(r){return r.id===reminder.id?{...r,dismissed:true,updatedAt:Date.now()}:r;}));
    }
  }
  function handleDefer(reminder,ms){
    var newDT=new Date(new Date(reminder.datetime).getTime()+ms).toISOString().slice(0,16);
    setReminders(reminders.map(function(r){return r.id===reminder.id?{...r,datetime:newDT,dismissed:false,updatedAt:Date.now()}:r;}));
  }

  var selectedReminder=selected?reminders.find(function(r){return r.id===selected;}):null;

  return(
    <div style={{padding:'12px 14px',paddingBottom:80}}>
      {/* Overdue */}
      {overdue.length>0&&(
        <div style={{marginBottom:16}}>
          <div className="section-label" style={{color:COLORS.rd}}>⚠ OVERDUE ({overdue.length})</div>
          {overdue.map(function(r){return <ReminderCard key={r.id} reminder={r} cats={cats} onClick={function(){setSelected(r.id);}}/>;} )}
        </div>
      )}

      {/* Upcoming */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div className="section-label" style={{marginBottom:0}}>UPCOMING ({upcoming.length})</div>
      </div>
      {upcoming.length===0&&overdue.length===0&&(
        <div className="card" style={{textAlign:'center',color:COLORS.mu,padding:20}}>No active reminders. Tap + to add one.</div>
      )}
      {upcoming.map(function(r){return <ReminderCard key={r.id} reminder={r} cats={cats} onClick={function(){setSelected(r.id);}}/>;} )}

      {/* Dismissed */}
      {dismissed.length>0&&(
        <div style={{marginTop:16}}>
          <div className="section-label" style={{color:COLORS.mu}}>✓ DISMISSED ({dismissed.length})</div>
          {dismissed.map(function(r){return <ReminderCard key={r.id} reminder={r} cats={cats} onClick={function(){setSelected(r.id);}}/>;} )}
        </div>
      )}

      {selectedReminder&&(
        <ReminderDetailModal
          reminder={selectedReminder}
          cats={cats}
          onClose={function(){setSelected(null);}}
          onSave={function(u){handleSave(u);}}
          onDelete={function(id){handleDelete(id);setSelected(null);}}
          onDismiss={function(r){handleDismiss(r);}}
          onDefer={function(r,ms){handleDefer(r,ms);}}
        />
      )}
    </div>
  );
}

                  <div key={m.id} onClick={function(){toggleMilestone(m.id);}} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid '+COLORS.bo,cursor:'pointer'}}>

            {goal.notes?(<div style={{fontSize:13,background:COLORS.bo,borderRadius:6,padding:'8px 10px',marginBottom:10,whiteSpace:'pre-wrap'}}>{goal.notes}</div>):null}
            {(goal.images||[]).length>0&&(

// ─── AI ASSISTANT MODAL ──────────────────────────────────────────
function AIAssistant({settings,onSettingsUpdate,tasks,reminders,goals,notes,cats,onClose}){
  const[messages,setMessages]=useState([{role:'assistant',text:"Hi Jesse! I'm your Waypoint assistant. Ask me anything — general questions, math, or ask about your tasks, goals, and reminders."}]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(false);
  const[listening,setListening]=useState(false);
  const chatEndRef=useRef();
  const recogRef=useRef(null);

  useEffect(()=>{if(chatEndRef.current)chatEndRef.current.scrollIntoView({behavior:'smooth'});},[messages]);

  function buildContext(){
    const todayTasks=tasks.filter(t=>t.date===TODAY&&!t.done);
    const overdueR=reminders.filter(r=>!r.dismissed&&new Date(r.datetime)<new Date());
    const activeGoals=goals.filter(g=>!g.completed);
    return `You are a helpful personal assistant built into Waypoint, Jesse's personal life management app.
Today is ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}.
Jesse's active tasks today: ${todayTasks.map(t=>`${t.priority}: ${t.text}`).join(', ')||'none'}.
Overdue reminders: ${overdueR.map(r=>r.title).join(', ')||'none'}.
Active goals: ${activeGoals.map(g=>g.title).join(', ')||'none'}.
Recent notes: ${notes.slice(0,5).map(n=>n.body).join(' | ')||'none'}.
Keep answers concise and practical. If asked about Waypoint data, use the context above.`;
  }

  function sendMessage(text){
    if(!text.trim()||loading)return;
    var userMsg={role:'user',text:text.trim()};
    setMessages(function(m){return[...m,userMsg];});
    setInput('');
    setLoading(true);
    var history=messages.slice(-8).map(function(m){return{role:m.role==='assistant'?'assistant':'user',content:m.text};});
    var useGroq=settings.aiEngine==='groq'||(settings.aiEngineForcedGroqUntil&&new Date()<new Date(settings.aiEngineForcedGroqUntil));

    function handleReply(reply){
      setMessages(function(m){return[...m,{role:'assistant',text:reply}];});
      if('speechSynthesis' in window){
        window.speechSynthesis.cancel();
        var utt=new SpeechSynthesisUtterance(reply);
        utt.rate=1.05;utt.pitch=1;
        window.speechSynthesis.speak(utt);
      }
      setLoading(false);
    }
    function handleErr(){
      setMessages(function(m){return[...m,{role:'assistant',text:'Error reaching AI. Check your API key in Settings.'}];});
      setLoading(false);
    }

    if(useGroq&&settings.groqApiKey){
      fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.groqApiKey},body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:buildContext()},...history,{role:'user',content:text}],max_tokens:400})})
      .then(function(r){return r.json();})
      .then(function(d){
        var reply=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'No response.';
        handleReply(reply);
      })
      .catch(handleErr);
    } else if(settings.geminiApiKey){
      fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+settings.geminiApiKey,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:buildContext()+'\n\nConversation so far:\n'+history.map(function(m){return m.role+': '+m.content;}).join('\n')+'\n\nuser: '+text}]}]})})
      .then(function(r){
        var status=r.status;
        return r.json().then(function(d){return{status:status,data:d};});
      })
      .then(function(res){
        if(res.status===429){
          var until=new Date();until.setHours(24,0,0,0);
          onSettingsUpdate({...settings,aiEngine:'groq',aiEngineForcedGroqUntil:until.toISOString()});
        }
        var reply=(res.data.candidates&&res.data.candidates[0]&&res.data.candidates[0].content&&res.data.candidates[0].content.parts&&res.data.candidates[0].content.parts[0]&&res.data.candidates[0].content.parts[0].text)||'No response.';
        handleReply(reply);
      })
      .catch(handleErr);
    } else {
      handleReply('No API key set. Add your Gemini or Groq key in ⚙ Settings → API.');
    }
  }

  function startListening(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Speech recognition not supported on this browser.');return;}
    if(recogRef.current){recogRef.current.stop();}
    const r=new SR();
    r.continuous=false;r.interimResults=false;r.lang='en-US';
    r.onstart=()=>setListening(true);
    r.onend=()=>setListening(false);
    r.onresult=e=>{
      const transcript=e.results[0][0].transcript.trim();
      const phrase=(settings.closePhrase||'hey waypoint close').toLowerCase();
      if(transcript.toLowerCase().includes(phrase)){
        window.speechSynthesis&&window.speechSynthesis.cancel();
        onClose();return;
      }
      sendMessage(transcript);
    };
    r.onerror=()=>setListening(false);
    recogRef.current=r;
    r.start();
  }

  function handleClose(){if(window.speechSynthesis)window.speechSynthesis.cancel();onClose();}

  return(
    <div className="modal-overlay" onClick={handleClose}>
      <div className="modal-box center" style={{maxHeight:'80vh',display:'flex',flexDirection:'column',margin:16}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexShrink:0}}>
          <div>
            <span style={{fontSize:15,fontWeight:'bold',color:COLORS.te}}>🤖 AI Assistant</span>
            <span style={{fontSize:11,color:COLORS.mu,marginLeft:8}}>● {settings.aiEngine==='gemini'?'Gemini':'Groq'}</span>
          </div>
          <button onClick={handleClose} style={{background:'transparent',color:COLORS.mu,fontSize:18}}>✕</button>
        </div>
        {/* Messages */}
        <div style={{flex:1,overflowY:'auto',marginBottom:12,display:'flex',flexDirection:'column',gap:10}}>
          {messages.map((m,i)=>(
            <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
              <div style={{maxWidth:'82%',padding:'9px 13px',borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',background:m.role==='user'?COLORS.te+'33':COLORS.bo,color:COLORS.tx,fontSize:13,lineHeight:1.5,border:`1px solid ${m.role==='user'?COLORS.te+'55':COLORS.bo}`}}>
                {m.text}
              </div>
            </div>
          ))}
          {loading&&<div style={{display:'flex',justifyContent:'flex-start'}}><div style={{padding:'9px 13px',borderRadius:'16px 16px 16px 4px',background:COLORS.bo,color:COLORS.mu,fontSize:13}}>Thinking…</div></div>}
          <div ref={chatEndRef}/>
        </div>
        {/* Input row */}
        <div style={{display:'flex',gap:8,flexShrink:0}}>
          <button onMouseDown={startListening} style={{background:listening?COLORS.rd:COLORS.bo,color:listening?'#fff':COLORS.mu,width:40,height:40,borderRadius:8,fontSize:18,flexShrink:0}}>{listening?'⏹':'🎤'}</button>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendMessage(input)} placeholder="Ask anything..." style={{flex:1}}/>
          <button onClick={()=>sendMessage(input)} disabled={loading||!input.trim()} style={{background:COLORS.te,color:'#111',padding:'0 14px',fontWeight:'bold',opacity:(!input.trim()?0.4:1),flexShrink:0}}>Send</button>
        </div>
        <div style={{fontSize:10,color:COLORS.mu,textAlign:'center',marginTop:8}}>Say "{settings.closePhrase||'hey waypoint close'}" to close hands-free</div>
      </div>
    </div>
  );
}

      </div>

      {/* Notes list */}
      {filtered.length===0&&<div className="card" style={{textAlign:'center',color:COLORS.mu,padding:20}}>No notes yet. Capture something above.</div>}
      {filtered.map(n=>{
        const tc=tagColor[n.tag]||COLORS.mu;
        const d=new Date(n.createdAt);
        const ds=d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        return(
          <div key={n.id} className="card" style={{marginBottom:8,borderLeft:`3px solid ${tc}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
              <span className="badge" style={{background:tc+'22',color:tc,border:`1px solid ${tc}44`}}>{n.tag}</span>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{fontSize:11,color:COLORS.mu}}>{ds}</span>
                <button onClick={()=>onDelete(n.id)} style={{background:'transparent',color:COLORS.mu,fontSize:12,padding:'0 4px'}}>✕</button>
              </div>
            </div>
            <div style={{fontSize:14,whiteSpace:'pre-wrap',lineHeight:1.5}}>{n.body}</div>
          </div>
        );
      })}
    </div>
  );
}

// ─── DESKTOP SIDEBAR ─────────────────────────────────────────────
function DesktopSidebar({tab,setTab,hasOverdue,tasks,reminders,goals,settings,onShowAI,onShowSettings}){
  var tabs=[{id:'dashboard',icon:'🏠',label:'Dashboard'},{id:'reminders',icon:'🔔',label:'Reminders'},{id:'goals',icon:'🎯',label:'Goals'},{id:'notes',icon:'📝',label:'Notes'}];
  var now=new Date();
  var todayActive=tasks.filter(function(t){return t.date===TODAY&&!t.done;}).length;
  var todayDone=tasks.filter(function(t){return t.date===TODAY&&t.done;}).length;
  var todayTotal=todayActive+todayDone;
  var overdueR=reminders.filter(function(r){return!r.dismissed&&new Date(r.datetime)<now;}).length;
  var upcomingR=reminders.filter(function(r){return!r.dismissed&&new Date(r.datetime)>=now;}).length;
  var activeG=goals.filter(function(g){return!g.completed;}).length;
  return(
    <div style={{position:'fixed',top:0,left:0,bottom:0,width:220,background:COLORS.su,borderRight:'1px solid '+COLORS.bo,display:'flex',flexDirection:'column',zIndex:50,overflowY:'auto'}}>
      {/* Logo */}
      <div style={{padding:'18px 16px 14px',borderBottom:'1px solid '+COLORS.bo}}>
        <div style={{fontSize:18,fontWeight:'bold',color:COLORS.te,letterSpacing:1}}>🧭 WAYPOINT</div>
        <div style={{fontSize:9,color:COLORS.mu,letterSpacing:2,marginTop:2}}>PERSONAL COMMAND CENTER</div>
      </div>

      {/* Nav */}
      <div style={{padding:'10px 8px'}}>
        {tabs.map(function(t){
          var active=tab===t.id;
          return(
            <button key={t.id} onClick={function(){setTab(t.id);}} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:8,background:active?COLORS.te+'22':'transparent',color:active?COLORS.te:COLORS.mu,fontSize:14,textAlign:'left',marginBottom:2,position:'relative'}}>
              <span style={{fontSize:18}}>{t.icon}</span>
              <span style={{fontWeight:active?'bold':'normal'}}>{t.label}</span>
              {t.id==='reminders'&&hasOverdue&&<span style={{position:'absolute',right:10,top:'50%',marginTop:-4,width:8,height:8,borderRadius:'50%',background:COLORS.rd}}/>}
            </button>
          );
        })}
      </div>

      {/* Today Summary */}
      <div style={{margin:'8px 12px',padding:'12px',background:COLORS.ca,borderRadius:10,border:'1px solid '+COLORS.bo}}>
        <div className="section-label" style={{marginBottom:10}}>TODAY AT A GLANCE</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:COLORS.mu}}>Tasks</span>
            <span style={{fontSize:13,color:COLORS.bl,fontWeight:'bold'}}>{todayDone}/{todayTotal}</span>
          </div>
          {todayTotal>0&&(
            <div style={{height:4,background:COLORS.bo,borderRadius:2,overflow:'hidden'}}>
              <div style={{height:'100%',width:(todayTotal>0?Math.round((todayDone/todayTotal)*100):0)+'%',background:COLORS.bl,borderRadius:2}}/>
            </div>
          )}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:COLORS.mu}}>Reminders</span>
            <span style={{fontSize:13,color:overdueR>0?COLORS.rd:COLORS.te,fontWeight:'bold'}}>{overdueR>0?overdueR+' overdue':upcomingR+' upcoming'}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:COLORS.mu}}>Goals</span>
            <span style={{fontSize:13,color:COLORS.pu,fontWeight:'bold'}}>{activeG} active</span>
          </div>
        </div>
      </div>

      {/* Spacer */}
      <div style={{flex:1}}/>

      {/* Bottom actions */}
      <div style={{padding:'12px 8px',borderTop:'1px solid '+COLORS.bo,display:'flex',flexDirection:'column',gap:6}}>
        <button onClick={onShowAI} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,background:COLORS.bo,color:settings.aiEngine==='gemini'?COLORS.te:COLORS.pu,fontSize:13,border:'1px solid '+(settings.aiEngine==='gemini'?COLORS.te:COLORS.pu)+'44',textAlign:'left'}}>
          <span>●</span><span>{settings.aiEngine==='gemini'?'Gemini':'Groq'} Assistant</span>
        </button>
        <button onClick={onShowSettings} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderRadius:8,background:COLORS.bo,color:COLORS.mu,fontSize:13,textAlign:'left'}}>
          <span>⚙</span><span>Settings</span>
        </button>
      </div>
    </div>
  );
}


function BottomNav({tab,setTab,hasOverdue}){
  const tabs=[{id:'dashboard',icon:'🏠',label:'Dashboard'},{id:'reminders',icon:'🔔',label:'Reminders'},{id:'goals',icon:'🎯',label:'Goals'},{id:'notes',icon:'📝',label:'Notes'}];
  return(
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:COLORS.su,borderTop:`1px solid ${COLORS.bo}`,display:'flex',zIndex:100,maxWidth:600,margin:'0 auto'}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:'transparent',color:tab===t.id?COLORS.te:COLORS.mu,padding:'10px 0',fontSize:11,display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative'}}>
          <span style={{fontSize:20,position:'relative'}}>
            {t.icon}
            {t.id==='reminders'&&hasOverdue&&<span style={{position:'absolute',top:-2,right:-4,width:8,height:8,borderRadius:'50%',background:COLORS.rd}}/>}
          </span>
          {t.label}
        </button>
      ))}
    </div>
  );
}

function TopNav({tab,setTab,hasOverdue}){
  const tabs=[{id:'dashboard',icon:'🏠',label:'Dashboard'},{id:'reminders',icon:'🔔',label:'Reminders'},{id:'goals',icon:'🎯',label:'Goals'},{id:'notes',icon:'📝',label:'Notes'}];
  return(
    <div style={{background:COLORS.su,borderBottom:`1px solid ${COLORS.bo}`,display:'flex',gap:4,padding:'0 16px'}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)} style={{background:'transparent',color:tab===t.id?COLORS.te:COLORS.mu,padding:'12px 16px',fontSize:13,borderBottom:tab===t.id?`2px solid ${COLORS.te}`:'2px solid transparent',position:'relative'}}>
          {t.icon} {t.label}
          {t.id==='reminders'&&hasOverdue&&<span style={{position:'absolute',top:8,right:4,width:7,height:7,borderRadius:'50%',background:COLORS.rd}}/>}
        </button>
      ))}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────
function App(){
  const w=useWindowWidth();
  const isDesktop=w>=900;
  const isMobile=!isDesktop;
  const[tab,setTab]=useState('dashboard');
  const[showSettings,setShowSettings]=useState(false);
  const[showAdd,setShowAdd]=useState(false);
  const[showAI,setShowAI]=useState(false);
  const[storageReady,setStorageReady]=useState(false);
  const[tasks,setTasksRaw]=useState(SAMPLE_TASKS);
  const[reminders,setRemindersRaw]=useState(SAMPLE_REMINDERS);
  const[goals,setGoalsRaw]=useState(SAMPLE_GOALS);
  const[cats,setCatsRaw]=useState(DEFAULT_CATEGORIES);
  const[settings,setSettingsRaw]=useState(DEFAULT_SETTINGS);
  const[notes,setNotesRaw]=useState([]);
  const[syncStatus,setSyncStatus]=useState('idle');
  const[syncMsg,setSyncMsg]=useState('');
  const[lastSynced,setLastSynced]=useState(load('waypoint_lastSynced',null));

  // Load once on mount, then apply carry-forward
  useEffect(()=>{
    const t=load('waypoint_tasks',SAMPLE_TASKS);
    const carried=applyCarryForward(t);
    setTasksRaw(carried);
    setRemindersRaw(load('waypoint_reminders',SAMPLE_REMINDERS));
    setGoalsRaw(load('waypoint_goals',SAMPLE_GOALS));
    setCatsRaw(load('waypoint_categories',DEFAULT_CATEGORIES));
    setSettingsRaw(load('waypoint_settings',DEFAULT_SETTINGS));
    setNotesRaw(load('waypoint_notes',[]));
    setStorageReady(true);
  },[]);

  // Guarded auto-saves (debounced 600ms)
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveGuarded('waypoint_tasks',tasks),600);return()=>clearTimeout(t);},[tasks,storageReady]);
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveGuarded('waypoint_reminders',reminders),600);return()=>clearTimeout(t);},[reminders,storageReady]);
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveGuarded('waypoint_goals',goals),600);return()=>clearTimeout(t);},[goals,storageReady]);
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveAny('waypoint_categories',cats),600);return()=>clearTimeout(t);},[cats,storageReady]);
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveAny('waypoint_settings',settings),600);return()=>clearTimeout(t);},[settings,storageReady]);
  useEffect(()=>{if(!storageReady)return;const t=setTimeout(()=>saveGuarded('waypoint_notes',notes),600);return()=>clearTimeout(t);},[notes,storageReady]);

  function setTasks(v){setTasksRaw(v);}
  function setReminders(v){setRemindersRaw(v);}
  function setGoals(v){setGoalsRaw(v);}
  function setCats(v){setCatsRaw(v);}
  function setSettings(v){setSettingsRaw(v);}

  // ─── SYNC ────────────────────────────────────────────────────────
  function mergeCollection(local,remote){
    var merged={};
    local.forEach(function(item){merged[item.id]=item;});
    remote.forEach(function(item){
      if(!merged[item.id]){merged[item.id]=item;}
      else{var lt=merged[item.id].updatedAt||0;var rt=item.updatedAt||0;if(rt>lt)merged[item.id]=item;}
    });
    return Object.keys(merged).map(function(k){return merged[k];});
  }

  function pushToGist(){
    var token=settings.gistToken;var gistId=settings.gistId;
    if(!token||!gistId){setSyncStatus('error');setSyncMsg('Enter PAT + Gist ID in Sync settings first');return;}
    setSyncStatus('syncing');setSyncMsg('Pushing...');
    var payload={tasks:tasks,reminders:reminders,goals:goals,cats:cats,notes:notes,lastModified:new Date().toISOString()};
    fetch('https://api.github.com/gists/'+gistId,{
      method:'PATCH',
      headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
      body:JSON.stringify({files:{'waypoint-data.json':{content:JSON.stringify(payload,null,2)}}})
    })
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.id){
        var ts=new Date().toISOString();
        setLastSynced(ts);saveAny('waypoint_lastSynced',ts);
        setSyncStatus('ok');setSyncMsg('Pushed '+ts.slice(11,16)+'Z');
      } else {
        setSyncStatus('error');setSyncMsg(d.message||'Push failed');
      }
    })
    .catch(function(){setSyncStatus('error');setSyncMsg('Network error');});
  }

  function pullFromGist(){
    var token=settings.gistToken;var gistId=settings.gistId;
    if(!token||!gistId){setSyncStatus('error');setSyncMsg('Enter PAT + Gist ID in Sync settings first');return;}
    setSyncStatus('syncing');setSyncMsg('Pulling...');
    fetch('https://api.github.com/gists/'+gistId,{headers:{'Authorization':'token '+token}})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.files||!d.files['waypoint-data.json']){setSyncStatus('error');setSyncMsg('File not found in Gist');return;}
      var remote;
      try{remote=JSON.parse(d.files['waypoint-data.json'].content);}
      catch(e){setSyncStatus('error');setSyncMsg('JSON parse error');return;}
      if(remote.tasks)setTasksRaw(mergeCollection(tasks,remote.tasks));
      if(remote.reminders)setRemindersRaw(mergeCollection(reminders,remote.reminders));
      if(remote.goals)setGoalsRaw(mergeCollection(goals,remote.goals));
      if(remote.notes)setNotesRaw(mergeCollection(notes,remote.notes));
      var ts=new Date().toISOString();
      setLastSynced(ts);saveAny('waypoint_lastSynced',ts);
      setSyncStatus('ok');setSyncMsg('Pulled '+ts.slice(11,16)+'Z');
    })
    .catch(function(){setSyncStatus('error');setSyncMsg('Network error');});
  }

  // Ref keeps auto-sync interval pointing at latest push function
  var autoSyncRef=useRef(null);
  autoSyncRef.current=pushToGist;
  useEffect(function(){
    if(!settings.gistToken||!settings.gistId)return;
    var iv=setInterval(function(){autoSyncRef.current();},5*60*1000);
    return function(){clearInterval(iv);};
  },[settings.gistToken,settings.gistId]);

  const hasOverdue=reminders.some(r=>!r.dismissed&&new Date(r.datetime)<new Date());

  function handleTaskToggle(id){setTasks(tasks.map(t=>t.id===id?{...t,done:!t.done,updatedAt:Date.now()}:t));}
  function handleTaskUpdate(task){setTasks(tasks.map(t=>t.id===task.id?{...task,updatedAt:Date.now()}:t));}
  function handleTaskDelete(id){setTasks(tasks.filter(t=>t.id!==id));}
  function handleNoteAdd(n){setNotesRaw(prev=>[{...n,updatedAt:Date.now()},...prev]);}
  function handleNoteDelete(id){setNotesRaw(prev=>prev.filter(n=>n.id!==id));}

  function handleExport(){
    const data={tasks,reminders,goals,cats,settings,notes,exportedAt:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='waypoint-backup.json';a.click();
  }

  function handleImport(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.tasks)setTasks(d.tasks);
        if(d.reminders)setReminders(d.reminders);
        if(d.goals)setGoals(d.goals);
        if(d.cats)setCats(d.cats);
        if(d.settings)setSettings(d.settings);
        if(d.notes)setNotesRaw(d.notes);
        alert('Backup imported successfully.');
      }catch{alert('Invalid backup file.');}
    };
    r.readAsText(file);
  }

  return(
    <div style={{display:'flex',minHeight:'100vh',background:COLORS.bg}}>
      {/* Desktop sidebar */}
      {isDesktop&&<DesktopSidebar tab={tab} setTab={setTab} hasOverdue={hasOverdue} tasks={tasks} reminders={reminders} goals={goals} settings={settings} onShowAI={()=>setShowAI(true)} onShowSettings={()=>setShowSettings(true)}/>}

      {/* Main content */}
      <div style={{flex:1,marginLeft:isDesktop?220:0,minWidth:0,display:'flex',flexDirection:'column',minHeight:'100vh'}}>

        {/* Mobile header only */}
        {isMobile&&(
          <div style={{background:COLORS.su,borderBottom:'1px solid '+COLORS.bo,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
            <div>
              <div style={{fontSize:18,fontWeight:'bold',color:COLORS.te,letterSpacing:1}}>🧭 WAYPOINT</div>
              <div style={{fontSize:10,color:COLORS.mu,letterSpacing:2}}>PERSONAL COMMAND CENTER</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <button onClick={()=>setShowAI(true)} style={{background:COLORS.bo,color:settings.aiEngine==='gemini'?COLORS.te:COLORS.pu,padding:'5px 10px',borderRadius:8,fontSize:11,border:`1px solid ${settings.aiEngine==='gemini'?COLORS.te:COLORS.pu}44`}}>● {settings.aiEngine==='gemini'?'Gemini':'Groq'}</button>
              <button onClick={()=>setShowSettings(true)} style={{background:COLORS.bo,color:COLORS.mu,width:34,height:34,borderRadius:8,fontSize:16}}>⚙</button>
            </div>
          </div>
        )}

        {/* Desktop page header bar */}
        {isDesktop&&(
          <div style={{background:COLORS.su,borderBottom:'1px solid '+COLORS.bo,padding:'14px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
            <div style={{fontSize:16,fontWeight:'bold',color:COLORS.tx,letterSpacing:0.5}}>
              {tab==='dashboard'&&'🏠 Dashboard'}
              {tab==='reminders'&&'🔔 Reminders'}
              {tab==='goals'&&'🎯 Goals'}
              {tab==='notes'&&'📝 Notes'}
            </div>
            <div style={{fontSize:12,color:COLORS.mu}}>{getDayStr()}</div>
          </div>
        )}

        {/* Content area */}
        <div style={{flex:1,overflowY:'auto',maxWidth:isDesktop?'none':600,margin:isDesktop?0:'0 auto',width:'100%'}}>
          {tab==='dashboard'&&<Dashboard tasks={tasks} reminders={reminders} goals={goals} cats={cats} onTaskToggle={handleTaskToggle} onTaskUpdate={handleTaskUpdate} onTaskDelete={handleTaskDelete} isDesktop={isDesktop}/>}
          {tab==='reminders'&&<RemindersModule reminders={reminders} setReminders={setReminders} cats={cats} isDesktop={isDesktop}/>}
          {tab==='goals'&&<GoalsModule goals={goals} setGoals={setGoals} cats={cats} isDesktop={isDesktop}/>}
          {tab==='notes'&&<NotesModule notes={notes} onAdd={handleNoteAdd} onDelete={handleNoteDelete} isDesktop={isDesktop}/>}
        </div>

        {isMobile&&<BottomNav tab={tab} setTab={setTab} hasOverdue={hasOverdue}/>}
      </div>

      {/* FAB */}
      <button onClick={()=>setShowAdd(true)} style={{position:'fixed',bottom:isMobile?70:24,right:24,width:52,height:52,borderRadius:'50%',background:COLORS.te,color:'#111',fontSize:26,fontWeight:'bold',boxShadow:'0 4px 16px rgba(20,184,166,.4)',zIndex:200}}>+</button>

      {showAI&&<AIAssistant settings={settings} onSettingsUpdate={setSettings} tasks={tasks} reminders={reminders} goals={goals} notes={notes} cats={cats} onClose={()=>setShowAI(false)}/>}
      {showSettings&&<SettingsModal settings={settings} onSave={setSettings} cats={cats} onCatSave={setCats} onClose={()=>setShowSettings(false)} onExport={handleExport} onImport={handleImport} onPush={pushToGist} onPull={pullFromGist} onSyncSave={function(v){setSettings({...settings,...v});}} syncStatus={syncStatus} syncMsg={syncMsg} lastSynced={lastSynced}/>}
      {showAdd&&<QuickAddModal cats={cats} onAddTask={t=>{setTasks([...tasks,t]);}} onAddReminder={r=>{setReminders([...reminders,r]);}} onAddGoal={g=>{setGoals([...goals,g]);}} onClose={()=>setShowAdd(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
